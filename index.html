<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful Rhythm | Intentional Living</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- Core Theme Variables --- */
        [data-theme="dark"] {
            --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
            --text: #e8e8f0; --muted: #6b6b80; 
            --accent: #22c55e; --win: #3ecf7a; --lose: #ef4444;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.5);
            --toggle-bg: #1e1e2e; --input-bg: #13131a;
            --fasting: #22c55e; --fasting-glow: rgba(34, 197, 94, 0.35);
            --feasting: #eab308; --feasting-glow: rgba(234, 179, 8, 0.15);
            --chart-grid: #1e1e2e;
            
            /* Neutral Tab Active Colors */
            --tab-active-bg: #e8e8f0;
            --tab-active-text: #0a0a0f;
            --pulse-y: #eab308;
            --pulse-y-glow: rgba(234, 179, 8, 0.4);
        }

        [data-theme="light"] {
            --bg: #f2f2f7; --surface: #ffffff; --border: #dde0ea;
            --text: #0f0f1a; --muted: #8888a0; 
            --accent: #16a34a; --win: #1a8a4a; --lose: #d63030;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
            --toggle-bg: #dde0ea; --input-bg: #ffffff;
            --fasting: #16a34a; --fasting-glow: rgba(22, 163, 74, 0.35);
            --feasting: #d97706; --feasting-glow: rgba(217, 119, 6, 0.15);
            --chart-grid: #e2e8f0;
            
            /* Neutral Tab Active Colors */
            --tab-active-bg: #0f0f1a;
            --tab-active-text: #ffffff;
            --pulse-y: #d97706;
            --pulse-y-glow: rgba(217, 119, 6, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Barlow', sans-serif;
            min-height: 100vh; padding: 0 0 4rem 0;
            transition: background 0.25s, color 0.25s;
        }

        /* --- Header --- */
        header {
            text-align: center; position: relative; z-index: 900;
            background: var(--bg); padding: 2rem 1.5rem; margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900; font-size: clamp(2.2rem, 5vw, 3rem);
            letter-spacing: 0.05em; text-transform: uppercase;
            color: var(--text); line-height: 1; margin-bottom: 0.4rem;
        }
        header p { color: var(--muted); font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; }

        .theme-toggle-wrapper { position: absolute; top: 1.5rem; right: 1.5rem; }
        .theme-toggle { display: flex; align-items: center; gap: 0.45rem; cursor: pointer; user-select: none; }
        .theme-toggle-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
        .toggle-track { width: 42px; height: 23px; background: var(--toggle-bg); border-radius: 12px; border: 1px solid var(--border); position: relative; transition: background 0.2s; }
        .toggle-knob { width: 17px; height: 17px; background: var(--muted); border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: transform 0.2s; }
        [data-theme="light"] .toggle-knob { transform: translateX(19px); }
        
        @media (max-width: 600px) { 
            .theme-toggle-label { display: none; } 
            .theme-toggle-wrapper { top: 1rem; right: 1rem; }
            header { padding: 1.5rem 1rem; }
        }

        /* Centered User Profile */
        .center-profile { display: flex; justify-content: center; align-items: center; gap: 0.75rem; margin-top: 1.5rem; animation: fadeIn 0.5s ease; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--surface); box-shadow: 0 0 0 1px var(--border); }
        .user-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 1rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text); }
        .btn-text-logout { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); cursor: pointer; border: 1px solid var(--border); background: var(--surface); border-radius: 12px; padding: 0.3rem 0.8rem; transition: all 0.2s; }
        .btn-text-logout:hover { color: var(--lose); border-color: var(--lose); }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

        /* --- Auth & Loading Screens --- */
        .auth-card, .loading-card {
            max-width: 450px; margin: 4rem auto;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 4rem 2rem; text-align: center;
            box-shadow: var(--card-shadow);
        }
        .auth-card h2 { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 2rem; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--text); }
        .auth-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.75rem;
            width: 100%; padding: 0.8rem 1rem; margin-top: 2rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif;
            font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.2s;
        }
        .auth-btn:hover { border-color: #4285F4; } 

        /* --- Collapsible Hero Fasting Tracker --- */
        .hero-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 1.5rem; 
            box-shadow: var(--card-shadow); margin-bottom: 2rem;
            transition: all 0.4s ease;
        }

        .hero-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .hero-card:not(.collapsed) .hero-header { border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 2rem; }
        .hero-header-left { display: flex; align-items: center; gap: 1rem; }
        .hero-header-right { display: flex; align-items: center; gap: 1rem; }

        .mini-pulse { width: 14px; height: 14px; border-radius: 50%; }
        .fasting-mode .mini-pulse { background: var(--fasting); box-shadow: 0 0 10px var(--fasting-glow); animation: pulseFasting 2.5s infinite ease-in-out; }
        .feasting-mode .mini-pulse { background: var(--feasting); box-shadow: 0 0 10px var(--feasting-glow); animation: pulseFeasting 4s infinite ease-in-out; }

        .hero-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); }
        .mini-time { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.4rem; tabular-nums; color: var(--muted); letter-spacing: 0.05em;}
        .hero-card:not(.collapsed) .mini-time { display: none; }

        .chevron-icon { width: 24px; height: 24px; color: var(--muted); transition: transform 0.3s ease; }
        .hero-card.collapsed .chevron-icon { transform: rotate(-90deg); }

        .hero-content { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .hero-card.collapsed .hero-content { display: none; }
        
        .fast-ring { width: 320px; height: 320px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; position: relative; }
        
        @keyframes pulseFasting { 0% { box-shadow: 0 0 20px var(--fasting-glow); } 50% { box-shadow: 0 0 65px var(--fasting-glow), 0 0 15px var(--fasting); } 100% { box-shadow: 0 0 20px var(--fasting-glow); } }
        @keyframes pulseFeasting { 0% { box-shadow: 0 0 15px var(--feasting-glow); } 50% { box-shadow: 0 0 45px var(--feasting-glow); } 100% { box-shadow: 0 0 15px var(--feasting-glow); } }

        .fasting-mode .fast-ring { animation: pulseFasting 2.5s infinite ease-in-out; }
        .feasting-mode .fast-ring { animation: pulseFeasting 4s infinite ease-in-out; }

        .fast-hole { width: 100%; height: 100%; border-radius: 50%; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.1; z-index: 2; }
        
        .fast-time { font-family: 'Barlow Condensed', sans-serif; font-size: 4.2rem; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
        .fast-label { font-size: 1rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.1em; transition: color 0.3s; margin-top: 0.5rem;}
        .fasting-mode .fast-label { color: var(--fasting); }
        .feasting-mode .fast-label { color: var(--feasting); }

        .stage-container { max-width: 600px; margin: 0.5rem auto 2.5rem; min-height: 80px; }
        .stage-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; text-transform: uppercase; transition: color 0.3s;}
        .stage-desc { font-size: 0.95rem; color: var(--muted); line-height: 1.5; }
        .fasting-mode .stage-title { color: var(--fasting); }
        .feasting-mode .stage-title { color: var(--feasting); }

        .action-btn { background: var(--input-bg); border: 2px solid var(--border); color: var(--text); padding: 1rem 3rem; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.3rem; text-transform: uppercase; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
        .feasting-mode .action-btn { border-color: var(--fasting); color: var(--fasting); }
        .feasting-mode .action-btn:hover { background: var(--fasting); color: #fff; box-shadow: 0 0 20px var(--fasting-glow);}
        .fasting-mode .action-btn { border-color: var(--feasting); color: var(--feasting); }
        .feasting-mode .action-btn:hover { background: var(--feasting); color: #111; box-shadow: 0 0 20px var(--feasting-glow); }

        /* --- Chart Section --- */
        .integrated-chart-section { width: 100%; margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;}
        .date-picker { display: flex; align-items: center; gap: 1rem; background: var(--input-bg); padding: 0.3rem 0.8rem; border-radius: 20px; border: 1px solid var(--border);}
        .date-nav-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: color 0.2s; padding: 0.2rem;}
        .date-nav-btn:hover { color: var(--text); }
        .date-range-display { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); min-width: 140px; text-align: center;}
        .view-toggle-group { display: flex; background: var(--toggle-bg); border-radius: 20px; padding: 3px; border: 1px solid var(--border); }
        .view-toggle-btn { background: transparent; border: none; padding: 0.4rem 1.2rem; border-radius: 17px; color: var(--muted); cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.85rem; transition: all 0.2s; }
        .view-toggle-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .chart-wrapper { width: 100%; height: 260px; position: relative; }

        /* --- Dynamic Tabbed Habits Card --- */
        .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; box-shadow: var(--card-shadow); margin-bottom: 2rem; }
        
        .tabs-scroll-container { display: flex; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1rem; gap: 0.2rem;}
        .scroll-arrow { background: transparent; border: none; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0.5rem 0.2rem; transition: color 0.2s; flex-shrink: 0; outline: none; }
        .scroll-arrow:hover { color: var(--text); }

        .tabs-header { display: flex; gap: 0.75rem; overflow-x: auto; scrollbar-width: none; align-items: center; flex-grow: 1; scroll-behavior: smooth; padding: 0 0.5rem; }
        .tabs-header::-webkit-scrollbar { display: none; }
        
        .tab-btn-group { display: flex; align-items: center; position: relative; }
        .tab-btn { 
            background: var(--input-bg); border: 1px solid var(--border); color: var(--muted); 
            padding: 0.6rem 1rem; border-radius: 12px; cursor: pointer; transition: all 0.2s; 
            display: flex; flex-direction: column; align-items: flex-start; gap: 0.2rem; outline: none;
            min-width: max-content;
        }
        
        /* New Neutral Active Tab Colors */
        .tab-btn.active { 
            background: var(--tab-active-bg); 
            color: var(--tab-active-text); 
            border-color: var(--tab-active-bg); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .tab-btn.active .cat-name, .tab-btn.active .cat-subtext { color: var(--tab-active-text); }
        
        /* Category Pulsing Dots */
        .cat-pulse-wrapper { display: flex; align-items: center; gap: 0.4rem; }
        .cat-pulse { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        
        .pulse-g { background: var(--win); box-shadow: 0 0 8px var(--win); animation: pulseG 2s infinite ease-in-out; }
        .pulse-y { background: var(--pulse-y); box-shadow: 0 0 8px var(--pulse-y-glow); animation: pulseY 2s infinite ease-in-out; }
        .pulse-r { background: var(--lose); box-shadow: 0 0 8px var(--lose); animation: pulseR 2s infinite ease-in-out; }
        
        @keyframes pulseG { 0% { box-shadow: 0 0 4px var(--win); } 50% { box-shadow: 0 0 12px var(--win); } 100% { box-shadow: 0 0 4px var(--win); } }
        @keyframes pulseY { 0% { box-shadow: 0 0 4px var(--pulse-y-glow); } 50% { box-shadow: 0 0 12px var(--pulse-y-glow); } 100% { box-shadow: 0 0 4px var(--pulse-y-glow); } }
        @keyframes pulseR { 0% { box-shadow: 0 0 4px var(--lose); } 50% { box-shadow: 0 0 12px var(--lose); } 100% { box-shadow: 0 0 4px var(--lose); } }

        .cat-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 1rem; }
        .cat-subtext { font-family: 'Barlow', sans-serif; font-size: 0.75rem; font-weight: 400; opacity: 0.7; letter-spacing: 0; text-transform: none;}
        .tab-btn.active .cat-subtext { opacity: 0.9; }

        .editable-text { cursor: text; border-bottom: 1px dashed transparent; transition: border-color 0.2s; white-space: nowrap;}
        .editable-text:hover, .editable-text:focus { border-bottom-color: var(--muted); outline: none; }
        .tab-btn.active .editable-text:hover, .tab-btn.active .editable-text:focus { border-bottom-color: rgba(255,255,255,0.7); }

        .delete-icon { opacity: 0; background: none; border: none; color: var(--lose); cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; padding: 0 0.5rem; }
        .habit-row:hover .delete-icon { opacity: 1; }

        .dash-list { display: flex; flex-direction: column; gap: 0.5rem; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .habit-row { display: flex; align-items: center; gap: 1rem; padding: 0.8rem 0; border-bottom: 1px solid var(--border); }
        .habit-row:last-child { border-bottom: none; }
        
        .habit-check { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: var(--input-bg); transition: all 0.2s; flex-shrink: 0;}
        .habit-check.done { background: var(--fasting); border-color: var(--fasting); }
        .habit-check.done::after { content: '✓'; color: #fff; font-size: 0.8rem; font-weight: bold; }
        
        .habit-label { font-weight: 500; font-size: 1rem; flex-grow: 1; white-space: normal; word-break: break-word;}
        
        .alive-dot { width: 8px; height: 8px; background: var(--fasting); border-radius: 50%; box-shadow: 0 0 8px var(--fasting-glow); animation: pulseFasting 2s infinite ease-in-out; display: inline-block; margin-right: 6px; }
        .habit-streak { font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; color: var(--text); font-weight: 700; display: flex; align-items: center; white-space: nowrap;}
        .habit-streak.zero { color: var(--muted); }
        .habit-streak.zero .alive-dot { display: none; }

        .btn-add-habit { background: transparent; border: 1px dashed var(--border); color: var(--muted); width: 100%; padding: 0.8rem; border-radius: 8px; cursor: pointer; font-family: 'Barlow', sans-serif; font-weight: 500; transition: all 0.2s; margin-top: 0.5rem; text-align: left; }
        .btn-add-habit:hover { border-color: var(--text); color: var(--text); }

    </style>
</head>
<body>

<header>
    <div class="theme-toggle-wrapper">
        <div class="theme-toggle" onclick="toggleTheme()" title="Toggle mode">
            <span class="toggle-icon" id="theme-icon">☀️</span>
            <span class="theme-toggle-label" id="theme-label">Light</span>
            <div class="toggle-track"><div class="toggle-knob"></div></div>
        </div>
    </div>
    
    <h1>Mindful Rhythm</h1>
    <p>Intentional Living</p>
    
    <div id="userProfileCenter" class="center-profile" style="display: none;">
        <img id="userAvatar" class="user-avatar" src="" alt="Profile">
        <span id="userName" class="user-name"></span>
        <button id="logoutBtn" class="btn-text-logout" onclick="signOut()">Log Out</button>
    </div>
</header>

<div class="container">
    <div id="loadingView" class="loading-card">
        <h2 style="color: var(--muted); font-size: 1.2rem;">Syncing Systems...</h2>
    </div>

    <div id="loginView" class="auth-card" style="display: none;">
        <h2>Connect Account</h2>
        <p style="color: var(--muted); font-size: 0.95rem;">Sign in to sync your fasting and habit records.</p>
        <button class="auth-btn" onclick="signInWithGoogle()">
            <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg" style="margin-right: 8px;">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
        </button>
    </div>

    <div id="mainContent" style="display: none;">
        
        <div id="fastingHero" class="hero-card feasting-mode">
            <div class="hero-header" onclick="toggleFastingCollapse()">
                <div class="hero-header-left">
                    <div class="mini-pulse"></div>
                    <span class="hero-title" id="miniHeroTitle">Feasting</span>
                </div>
                <div class="hero-header-right">
                    <span class="mini-time" id="miniFastTimeDisplay">00:00:00</span>
                    <svg class="chevron-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>

            <div class="hero-content">
                <div class="fast-ring" id="fastRing">
                    <div class="fast-hole">
                        <span class="fast-time" id="fastTimeDisplay">00:00:00</span>
                        <span class="fast-label" id="fastStatusLabel">Feasting</span>
                    </div>
                </div>
                <div class="stage-container">
                    <div class="stage-title" id="stageTitle">Loading...</div>
                    <div class="stage-desc" id="stageDesc">Calculating current biological phase...</div>
                </div>
                <button id="toggleFastBtn" class="action-btn" onclick="toggleFasting(event)">Done Eating</button>

                <div class="integrated-chart-section">
                    <div class="chart-header">
                        <div class="date-picker">
                            <button class="date-nav-btn" onclick="shiftChartData(-1)"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
                            <span class="date-range-display" id="chartDateRange">Mar 19 - Mar 25</span>
                            <button class="date-nav-btn" onclick="shiftChartData(1)"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
                        </div>
                        <div class="view-toggle-group">
                            <button id="btnWeekly" class="view-toggle-btn active" onclick="setChartView('weekly')">Weekly</button>
                            <button id="btnMonthly" class="view-toggle-btn" onclick="setChartView('monthly')">Monthly</button>
                        </div>
                    </div>
                    <div class="chart-wrapper"><canvas id="fastingChart"></canvas></div>
                </div>
            </div>
        </div>

        <div class="dash-card">
            
            <div class="tabs-scroll-container">
                <button class="scroll-arrow" onclick="scrollTabs(-1)">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                
                <div class="tabs-header" id="dynamicTabsHeader">
                    </div>
                
                <button class="scroll-arrow" onclick="scrollTabs(1)">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>

            <div id="dynamicHabitsContainer">
                </div>
        </div>

    </div>
</div>

<script>
    // ==========================================
    // 1. SUPABASE CONFIGURATION
    // ==========================================
    const SUPABASE_URL = 'https://ambpjxgidojgmwvvjglg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtYnBqeGdpZG9qZ213dnZqZ2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzQzNTQsImV4cCI6MjA5MDAxMDM1NH0.8TfCIQhAjPChBZn8op5J9ykyMc3hPDJ_vJuUEm3WcP4';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    const views = { loading: document.getElementById('loadingView'), login: document.getElementById('loginView'), main: document.getElementById('mainContent') };

    function showView(viewName) {
        Object.values(views).forEach(el => el.style.display = 'none');
        if (views[viewName]) views[viewName].style.display = 'block';
    }

    async function checkUser() {
        try {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            if (error) throw error;

            if (session) {
                currentUser = session.user;
                const meta = currentUser.user_metadata;
                if (meta) {
                    if (meta.avatar_url) document.getElementById('userAvatar').src = meta.avatar_url;
                    if (meta.full_name) document.getElementById('userName').innerText = meta.full_name.split(' ')[0];
                    document.getElementById('userProfileCenter').style.display = 'flex';
                } else {
                    document.getElementById('userProfileCenter').style.display = 'flex';
                }
                
                showView('main');
                
                if(localStorage.getItem('fastingCardCollapsed') === 'true') document.getElementById('fastingHero').classList.add('collapsed');

                await initFastingTracker(); 
                initChart();
                renderHabitsUI(); 
            } else {
                document.getElementById('userProfileCenter').style.display = 'none';
                showView('login');
            }
        } catch (err) { showView('login'); }
    }

    async function signInWithGoogle() { await supabaseClient.auth.signInWithOAuth({ provider: 'google' }); }
    async function signOut() { await supabaseClient.auth.signOut(); window.location.reload(); }

    // ==========================================
    // 2. HABITS ENGINE (DYNAMIC DATA)
    // ==========================================
    
    // Hardcoded Categories (Locked)
    let categories = [
        { id: 'cat_1', name: 'Purpose', subtext: 'What you build', habits: [
            { id: 'hab_1', name: 'PADI Theory / Instructor Study', streak: 4, done: true },
            { id: 'hab_2', name: 'Camp & Dive Web App Dev', streak: 0, done: false }
        ]},
        { id: 'cat_2', name: 'Waste', subtext: 'What drains you', habits: [
            { id: 'hab_3', name: 'No PlayStation Binge Gaming', streak: 8, done: true },
            { id: 'hab_4', name: 'No Mindless Doom Scrolling', streak: 3, done: true }
        ]},
        { id: 'cat_3', name: 'Nourish', subtext: 'What fuels you', habits: [
            { id: 'hab_5', name: 'Strict Keto / Sugar-Free Compliant', streak: 14, done: true },
            { id: 'hab_6', name: 'Black Coffee / Tea Only (Fasting)', streak: 21, done: true }
        ]},
        { id: 'cat_4', name: 'Train', subtext: 'What strengthens you', habits: [
            { id: 'hab_7', name: 'Evening Mobility / Stretch', streak: 2, done: true }
        ]},
        { id: 'cat_5', name: 'Recover', subtext: 'What restores you', habits: [
            { id: 'hab_8', name: '7+ Hours Restful Sleep', streak: 2, done: true },
            { id: 'hab_9', name: 'Screens off 1hr Before Bed', streak: 0, done: false }
        ]}
    ];
    let activeCatId = 'cat_1';

    function scrollTabs(direction) {
        const tabs = document.getElementById('dynamicTabsHeader');
        tabs.scrollBy({ left: direction * 200, behavior: 'smooth' });
    }

    function renderHabitsUI() {
        const tabsContainer = document.getElementById('dynamicTabsHeader');
        const listContainer = document.getElementById('dynamicHabitsContainer');
        
        tabsContainer.innerHTML = '';
        categories.forEach(cat => {
            const isActive = cat.id === activeCatId ? 'active' : '';
            
            // Calculate Pulse Color
            const totalHabits = cat.habits.length;
            const completedHabits = cat.habits.filter(h => h.done).length;
            let pulseClass = 'pulse-r'; // Default to red if 0 done
            
            if (totalHabits > 0) {
                if (completedHabits === totalHabits) pulseClass = 'pulse-g';
                else if (completedHabits > 0) pulseClass = 'pulse-y';
            }

            tabsContainer.innerHTML += `
                <div class="tab-btn-group">
                    <button class="tab-btn ${isActive}" onclick="setActiveCategory('${cat.id}')">
                        <div class="cat-pulse-wrapper">
                            <div class="cat-pulse ${pulseClass}"></div>
                            <span class="cat-name">${cat.name}</span>
                        </div>
                        <span class="cat-subtext">${cat.subtext}</span>
                    </button>
                </div>
            `;
        });

        const activeCat = categories.find(c => c.id === activeCatId);
        if (!activeCat) { listContainer.innerHTML = '<p style="color:var(--muted); padding: 1rem;">No category selected.</p>'; return; }

        let habitsHTML = `<div class="dash-list">`;
        activeCat.habits.forEach(hab => {
            const isDone = hab.done ? 'done' : '';
            const streakZeroClass = hab.streak === 0 ? 'zero' : '';
            habitsHTML += `
                <div class="habit-row">
                    <div class="habit-check ${isDone}" onclick="toggleHabit('${hab.id}')"></div>
                    <span class="habit-label editable-text" contenteditable="true" 
                          onblur="saveEdit(event, 'habit', '${hab.id}')" 
                          onkeydown="handleEnterKey(event)">${hab.name}</span>
                    <span class="habit-streak ${streakZeroClass}">
                        <span class="alive-dot"></span> ${hab.streak} Day${hab.streak !== 1 ? 's' : ''}
                    </span>
                    <button class="delete-icon" onclick="deleteHabit('${hab.id}')" title="Delete Habit">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            `;
        });
        habitsHTML += `<button class="btn-add-habit" onclick="addHabit()">+ Add Habit</button></div>`;
        listContainer.innerHTML = habitsHTML;
    }

    function setActiveCategory(id) { 
        if (activeCatId === id) return; 
        activeCatId = id; 
        renderHabitsUI(); 
    }
    
    function toggleHabit(id) {
        const cat = categories.find(c => c.id === activeCatId);
        const hab = cat.habits.find(h => h.id === id);
        hab.done = !hab.done;
        if(hab.done && hab.streak === 0) hab.streak = 1;
        else if(!hab.done && hab.streak === 1) hab.streak = 0;
        renderHabitsUI();
    }

    function addHabit() {
        const cat = categories.find(c => c.id === activeCatId);
        cat.habits.push({ id: 'hab_' + Date.now(), name: 'New Habit', streak: 0, done: false });
        renderHabitsUI();
    }

    function deleteHabit(id) {
        const cat = categories.find(c => c.id === activeCatId);
        cat.habits = cat.habits.filter(h => h.id !== id);
        renderHabitsUI();
    }

    function handleEnterKey(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            e.target.blur();    
        }
    }

    function saveEdit(e, type, id) {
        const newText = e.target.innerText.trim() || 'Unnamed';
        if (type === 'habit') {
            const cat = categories.find(c => c.id === activeCatId);
            const hab = cat.habits.find(h => h.id === id);
            if(hab) hab.name = newText;
        }
    }

    // ==========================================
    // 3. FASTING ENGINE
    // ==========================================
    let isFasting = false, startTime = null, currentFastId = null, timerInterval = null;
    const fastingStages = [
        { maxHour: 4, title: "Stage 1: Fed/Digestive State (0–4 Hours)", desc: "Process: Digestion and nutrient absorption.<br>Action: Glucose is used for energy, excess stored as glycogen." },
        { maxHour: 12, title: "Stage 2: Early Fasting/Postabsorptive Phase (4–12 Hours)", desc: "Process: Blood sugar and insulin levels decline.<br>Action: The body breaks down glycogen to release glucose for energy." },
        { maxHour: 16, title: "Stage 3: Ketosis and Fat Burning (12–16 Hours)", desc: "Process: Glycogen stores depleted, switching to burning fat.<br>Action: Production of ketones begins for brain fuel, increasing mental clarity." },
        { maxHour: 24, title: "Stage 4: Autophagy (16–24 Hours)", desc: "Process: The body begins 'cellular cleanup'.<br>Action: Repairs and recycles damaged components. Hunger heavily subsides." },
        { maxHour: 72, title: "Stage 5: Deep Fasting/Growth Hormone Phase (24–72 Hours)", desc: "Process: Peak autophagy and rise in Human Growth Hormone (HGH).<br>Action: Accelerated fat loss and significantly improved cognitive function." },
        { maxHour: 999, title: "Stage 6: Immune Regeneration (72+ Hours)", desc: "Process: Immune system stem cells are activated.<br>Action: Deep, long-term fat burning and cellular repair." }
    ];

    function toggleFastingCollapse() {
        const hero = document.getElementById('fastingHero');
        hero.classList.toggle('collapsed');
        localStorage.setItem('fastingCardCollapsed', hero.classList.contains('collapsed'));
    }

    async function initFastingTracker() {
        const { data, error } = await supabaseClient.from('fasting_sessions').select('*').eq('user_id', currentUser.id).order('start_time', { ascending: false }).limit(1);
        if (!error && data && data.length > 0) {
            const latestFast = data[0];
            if (!latestFast.end_time) { isFasting = true; startTime = new Date(latestFast.start_time).getTime(); currentFastId = latestFast.id; } 
            else { isFasting = false; startTime = new Date(latestFast.end_time).getTime(); currentFastId = null; }
        } else { isFasting = false; startTime = Date.now(); }
        updateUITheme(); updateTimer(); 
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(updateTimer, 1000); 
    }

    async function toggleFasting(event) {
        event.stopPropagation(); 
        const now = new Date(); document.getElementById('toggleFastBtn').disabled = true; 
        if (!isFasting) {
            isFasting = true; startTime = now.getTime(); updateUITheme(); 
            const { data } = await supabaseClient.from('fasting_sessions').insert([{ user_id: currentUser.id, start_time: now.toISOString() }]).select();
            if (data) currentFastId = data[0].id;
        } else {
            isFasting = false; const endTimeMs = now.getTime();
            const durationHours = ((endTimeMs - startTime) / (1000 * 60 * 60)).toFixed(2);
            startTime = endTimeMs; updateUITheme();
            if (currentFastId) {
                await supabaseClient.from('fasting_sessions').update({ end_time: now.toISOString(), duration_hours: durationHours }).eq('id', currentFastId);
                currentFastId = null;
            }
        }
        document.getElementById('toggleFastBtn').disabled = false; updateTimer();
    }

    function updateUITheme() {
        const hero = document.getElementById('fastingHero'), btn = document.getElementById('toggleFastBtn');
        if (isFasting) {
            hero.classList.remove('feasting-mode'); hero.classList.add('fasting-mode');
            document.getElementById('fastStatusLabel').innerText = "Fasting (Fat Burning)";
            document.getElementById('miniHeroTitle').innerText = "Fasting Active";
            btn.innerText = "Break Fast";
        } else {
            hero.classList.remove('fasting-mode'); hero.classList.add('feasting-mode');
            document.getElementById('fastStatusLabel').innerText = "Feasting (Accumulation)";
            document.getElementById('miniHeroTitle').innerText = "Feasting Window";
            btn.innerText = "Done Eating";
        }
    }

    function updateTimer() {
        if (!startTime) return;
        const totalSeconds = Math.floor(Math.max(0, Date.now() - startTime) / 1000);
        const hours = Math.floor(totalSeconds / 3600), minutes = Math.floor((totalSeconds % 3600) / 60), seconds = totalSeconds % 60;
        const displayTime = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        document.getElementById('fastTimeDisplay').innerText = displayTime;
        document.getElementById('miniFastTimeDisplay').innerText = displayTime;

        if (isFasting) {
            let currentStage = fastingStages[0];
            for (let stage of fastingStages) { if ((totalSeconds / 3600) < stage.maxHour) { currentStage = stage; break; } }
            document.getElementById('stageTitle').innerText = currentStage.title;
            document.getElementById('stageDesc').innerHTML = currentStage.desc;
        } else {
            document.getElementById('stageTitle').innerText = "Feasting Window (Nutrient Partitioning)";
            document.getElementById('stageDesc').innerHTML = "Process: Insulin rises to shuttle nutrients into cells.<br>Action: Replenishing glycogen, repairing muscle tissue, and preparing the body for the next fast.";
        }
    }

    // ==========================================
    // 4. CHART ENGINE
    // ==========================================
    let fastingChart = null; let currentChartView = 'weekly'; 
    const dummyData = {
        weekly: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], data: [14.5, 15.2, 16.0, 18.5, 16.2, 15.5, 12.0], dateDisplay: "Mar 19 - Mar 25" },
        monthly: { labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'], data: [15.1, 16.2, 15.8, 17.5], dateDisplay: "March 2026" }
    };

    function setChartView(view) {
        currentChartView = view;
        document.getElementById('btnWeekly').classList.toggle('active', view === 'weekly');
        document.getElementById('btnMonthly').classList.toggle('active', view === 'monthly');
        renderChart();
    }
    function shiftChartData(direction) { alert(`Will fetch ${direction === -1 ? 'previous' : 'next'} ${currentChartView} data from database!`); }

    function renderChart() {
        const ctx = document.getElementById('fastingChart').getContext('2d');
        const html = document.documentElement;
        const textColor = getComputedStyle(html).getPropertyValue('--muted').trim(), gridColor = getComputedStyle(html).getPropertyValue('--chart-grid').trim();
        const lineColor = getComputedStyle(html).getPropertyValue('--fasting').trim(), fillColor = getComputedStyle(html).getPropertyValue('--fasting-glow').trim();

        const chartData = dummyData[currentChartView];
        document.getElementById('chartDateRange').innerText = chartData.dateDisplay;

        const config = {
            type: 'line',
            data: { labels: chartData.labels, datasets: [{ label: 'Fasting Hours', data: chartData.data, borderColor: lineColor, backgroundColor: fillColor, borderWidth: 3, pointBackgroundColor: lineColor, pointBorderColor: '#fff', pointHoverBackgroundColor: '#fff', pointHoverBorderColor: lineColor, pointRadius: 5, pointHoverRadius: 7, fill: true, tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 10, max: 24, grid: { color: gridColor, drawBorder: false }, ticks: { color: textColor } }, x: { grid: { display: false, drawBorder: false }, ticks: { color: textColor } } } }
        };
        if(fastingChart) fastingChart.destroy();
        fastingChart = new Chart(ctx, config);
    }
    function initChart() { renderChart(); }
    
    // ==========================================
    // 5. THEME BOOT
    // ==========================================
    function toggleTheme() {
        const html = document.documentElement; 
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        
        // Match the label and icon to the newly selected theme
        document.getElementById('theme-icon').textContent = next === 'light' ? '☀️' : '🌙';
        document.getElementById('theme-label').textContent = next === 'light' ? 'Light' : 'Dark';
        
        if (currentUser) { updateTimer(); if(fastingChart) renderChart(); }
    }

    checkUser();
</script>
</body>
</html>
