<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful Rhythm | Live the Moment</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- Core Theme Variables --- */
        [data-theme="dark"] {
            --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
            --text: #e8e8f0; --muted: #6b6b80; 
            --accent: #22c55e; --win: #3ecf7a; --lose: #ef4444;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.5);
            --toggle-bg: #1e1e2e; --input-bg: #13131a;
            --fasting: #22c55e; --fasting-glow: rgba(34, 197, 94, 0.35);
            --feasting: #eab308; --feasting-glow: rgba(234, 179, 8, 0.15);
            --chart-grid: #1e1e2e;
            
            --pulse-y: #eab308; --pulse-y-glow: rgba(234, 179, 8, 0.4);
            --toggle-track-bg: #1e1e2e; --toggle-knob-bg: #e8e8f0; --toggle-icon-color: #0a0a0f;

            /* Vibrant Moment States Colors */
            --state-purpose: #5c88f2; --glow-purpose: rgba(92, 136, 242, 0.2);
            --state-waste: #fc7281;   --glow-waste: rgba(252, 114, 129, 0.2);
            --state-nourish: #f5c43d; --glow-nourish: rgba(245, 196, 61, 0.2);
            --state-train: #47d18c;   --glow-train: rgba(71, 209, 140, 0.2);
            --state-recover: #8d94e5; --glow-recover: rgba(141, 148, 229, 0.2);
        }

        [data-theme="light"] {
            --bg: #f2f2f7; --surface: #ffffff; --border: #dde0ea;
            --text: #0f0f1a; --muted: #8888a0; 
            --accent: #16a34a; --win: #1a8a4a; --lose: #d63030;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
            --toggle-bg: #dde0ea; --input-bg: #ffffff;
            --fasting: #16a34a; --fasting-glow: rgba(22, 163, 74, 0.35);
            --feasting: #d97706; --feasting-glow: rgba(217, 119, 6, 0.15);
            --chart-grid: #e2e8f0;
            
            --pulse-y: #d97706; --pulse-y-glow: rgba(217, 119, 6, 0.4);
            --toggle-track-bg: #dde0ea; --toggle-knob-bg: #0f0f1a; --toggle-icon-color: #ffffff;

            /* Vibrant Moment States Colors */
            --state-purpose: #5c88f2; --glow-purpose: rgba(92, 136, 242, 0.2);
            --state-waste: #fc7281;   --glow-waste: rgba(252, 114, 129, 0.2);
            --state-nourish: #f5c43d; --glow-nourish: rgba(245, 196, 61, 0.2);
            --state-train: #47d18c;   --glow-train: rgba(71, 209, 140, 0.2);
            --state-recover: #8d94e5; --glow-recover: rgba(141, 148, 229, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding: 0 0 4rem 0; transition: background 0.25s, color 0.25s; }

        /* --- Header & Top Controls --- */
        header { text-align: center; position: relative; z-index: 900; background: var(--bg); padding: 2rem 1.5rem 2.5rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); }
        header h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: clamp(2.2rem, 5vw, 3rem); letter-spacing: 0.05em; text-transform: uppercase; color: var(--text); line-height: 1; margin-bottom: 0.4rem; }
        header p { color: var(--muted); font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.5rem; }

        .date-time-display { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
        #currentDate { font-size: 0.9rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        #currentTime { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }

        /* Top Right Control Cluster */
        .controls-cluster { position: absolute; top: 1.5rem; right: 1.5rem; display: flex; align-items: center; gap: 1rem; }
        
        .icon-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; transition: color 0.2s; display: flex; align-items: center; justify-content: center; padding: 0.2rem; }
        .icon-btn:hover { color: var(--text); }
        
        .theme-toggle-container { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; cursor: pointer; user-select: none; margin-left: 0.5rem;}
        .sleek-toggle-track { width: 50px; height: 28px; border-radius: 16px; background: var(--toggle-track-bg); position: relative; transition: background 0.3s ease; }
        .sleek-toggle-knob { width: 20px; height: 20px; border-radius: 50%; background: var(--toggle-knob-bg); position: absolute; top: 4px; left: 4px; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1), background 0.3s ease; display: flex; align-items: center; justify-content: center; color: var(--toggle-icon-color); }
        [data-theme="dark"] .sleek-toggle-knob { transform: translateX(22px); }
        
        @media (max-width: 600px) { .controls-cluster { top: 1rem; right: 1rem; gap: 0.5rem; } header { padding: 1.5rem 1rem 2rem; } }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

        /* --- Generic Dash Card --- */
        .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; box-shadow: var(--card-shadow); margin-bottom: 2rem; transition: all 0.4s ease; }
        .card-title-centered { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); margin-bottom: 1.5rem; }

        /* --- Fasting Hero --- */
        .hero-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .dash-card:not(.collapsed) .hero-header { border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 2rem; }
        .hero-header-left { display: flex; align-items: center; gap: 1rem; }
        .hero-header-right { display: flex; align-items: center; gap: 1rem; }

        .mini-pulse { width: 14px; height: 14px; border-radius: 50%; }
        .fasting-mode .mini-pulse { background: var(--fasting); box-shadow: 0 0 10px var(--fasting-glow); animation: pulseFasting 2.5s infinite ease-in-out; }
        .feasting-mode .mini-pulse { background: var(--feasting); box-shadow: 0 0 10px var(--feasting-glow); animation: pulseFeasting 4s infinite ease-in-out; }

        .hero-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); }
        .mini-time { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.4rem; tabular-nums; color: var(--muted); letter-spacing: 0.05em;}
        .dash-card:not(.collapsed) .mini-time { display: none; }

        .chevron-icon { width: 24px; height: 24px; color: var(--muted); transition: transform 0.3s ease; }
        .dash-card.collapsed .chevron-icon { transform: rotate(-90deg); }

        .hero-content { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .dash-card.collapsed .hero-content { display: none; }
        
        .fast-ring { width: 320px; height: 320px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; position: relative; }
        
        @keyframes pulseFasting { 0% { box-shadow: 0 0 20px var(--fasting-glow); } 50% { box-shadow: 0 0 65px var(--fasting-glow), 0 0 15px var(--fasting); } 100% { box-shadow: 0 0 20px var(--fasting-glow); } }
        @keyframes pulseFeasting { 0% { box-shadow: 0 0 15px var(--feasting-glow); } 50% { box-shadow: 0 0 45px var(--feasting-glow); } 100% { box-shadow: 0 0 15px var(--feasting-glow); } }

        .fasting-mode .fast-ring { animation: pulseFasting 2.5s infinite ease-in-out; }
        .feasting-mode .fast-ring { animation: pulseFeasting 4s infinite ease-in-out; }

        .fast-hole { width: 100%; height: 100%; border-radius: 50%; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.1; z-index: 2; }
        
        .fast-time { font-family: 'Barlow Condensed', sans-serif; font-size: 4.8rem; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
        .fast-label { font-size: 1rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.1em; transition: color 0.3s; margin-top: 0.5rem;}
        .fasting-mode .fast-label { color: var(--fasting); }
        .feasting-mode .fast-label { color: var(--feasting); }

        .stage-container { max-width: 600px; margin: 0.5rem auto 2.5rem; min-height: 80px; }
        .stage-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; text-transform: uppercase; transition: color 0.3s;}
        .stage-desc { font-size: 0.95rem; color: var(--muted); line-height: 1.5; }
        .fasting-mode .stage-title { color: var(--fasting); }
        .feasting-mode .stage-title { color: var(--feasting); }

        .action-btn { background: var(--input-bg); border: 2px solid var(--border); color: var(--text); padding: 1rem 3rem; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.3rem; text-transform: uppercase; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
        .feasting-mode .action-btn { border-color: var(--fasting); color: var(--fasting); }
        .feasting-mode .action-btn:hover { background: var(--fasting); color: #fff; box-shadow: 0 0 20px var(--fasting-glow);}
        .feasting-mode .action-btn { border-color: var(--feasting); color: var(--feasting); }
        .feasting-mode .action-btn:hover { background: var(--feasting); color: #111; box-shadow: 0 0 20px var(--feasting-glow); }

        /* --- Moment States Dashboard --- */
        .moment-dashboard-layout { display: flex; gap: 3rem; align-items: center; justify-content: space-between; }
        .moment-timers-col { flex: 1; display: flex; flex-direction: column; gap: 0.75rem; }
        .moment-donut-col { width: 300px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;}
        @media (max-width: 768px) { .moment-dashboard-layout { flex-direction: column; gap: 2.5rem; } .moment-donut-col { width: 100%; max-width: 280px; margin: 0 auto; } }

        .moment-btn { background: var(--input-bg); border: 3px solid var(--border); border-radius: 12px; padding: 1rem 1.5rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s ease; position: relative; outline: none; }
        .moment-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.15rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); transition: color 0.3s;}
        .moment-timer-text { font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 1.15rem; tabular-nums; color: var(--text); transition: color 0.3s;}
        
        .moment-btn.active-purpose { border-color: var(--state-purpose); background: var(--surface); box-shadow: 0 4px 15px var(--glow-purpose); }
        .moment-btn.active-purpose .moment-label { color: var(--state-purpose); }
        
        .moment-btn.active-waste { border-color: var(--state-waste); background: var(--surface); box-shadow: 0 4px 15px var(--glow-waste); }
        .moment-btn.active-waste .moment-label { color: var(--state-waste); }

        .moment-btn.active-nourish { border-color: var(--state-nourish); background: var(--surface); box-shadow: 0 4px 15px var(--glow-nourish); }
        .moment-btn.active-nourish .moment-label { color: var(--state-nourish); }

        .moment-btn.active-train { border-color: var(--state-train); background: var(--surface); box-shadow: 0 4px 15px var(--glow-train); }
        .moment-btn.active-train .moment-label { color: var(--state-train); }

        .moment-btn.active-recover { border-color: var(--state-recover); background: var(--surface); box-shadow: 0 4px 15px var(--glow-recover); }
        .moment-btn.active-recover .moment-label { color: var(--state-recover); }

        .moment-donut-wrapper { width: 100%; aspect-ratio: 1; position: relative; display: flex; align-items: center; justify-content: center; margin: 0 auto;}
        .moment-donut-wrapper canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;}
        .donut-center-content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }
        .donut-center-content > * { pointer-events: auto; } 
        
        .user-avatar { width: 68px; height: 68px; border-radius: 50%; object-fit: cover; border: 3px solid var(--surface); box-shadow: 0 4px 10px rgba(0,0,0,0.15); margin-bottom: 0.5rem; }
        .user-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text); cursor: pointer; transition: color 0.2s; }
        .user-name:hover { color: var(--fasting); }
        .btn-text-logout { margin-top: 0.5rem; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); cursor: pointer; border: 1px solid var(--border); background: var(--surface); border-radius: 12px; padding: 0.3rem 0.8rem; transition: all 0.2s; animation: fadeIn 0.2s ease; }
        .btn-text-logout:hover { color: var(--lose); border-color: var(--lose); }

        /* --- Dynamic Tabbed Habits Card --- */
        .tabs-scroll-container { display: flex; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1rem; gap: 0.2rem;}
        .scroll-arrow { background: transparent; border: none; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0.5rem 0.2rem; transition: color 0.2s; flex-shrink: 0; outline: none; }
        .scroll-arrow:hover { color: var(--text); }
        .tabs-header { display: flex; gap: 0.75rem; overflow-x: auto; scrollbar-width: none; align-items: center; justify-content: center; flex-grow: 1; scroll-behavior: smooth; padding: 0 0.5rem; }
        .tabs-header::-webkit-scrollbar { display: none; }
        
        .tab-btn-group { display: flex; align-items: center; position: relative; }
        
        .tab-btn { background: var(--input-bg); border: 3px solid var(--border); color: var(--muted); padding: 0.6rem 1.2rem; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.2rem; outline: none; min-width: max-content; }
        
        /* Vibrant Borders & Matching Text for Habit Tabs */
        .tab-btn.active-tab-purpose { border-color: var(--state-purpose); background: var(--surface); box-shadow: 0 4px 15px var(--glow-purpose); }
        .tab-btn.active-tab-purpose .cat-name { color: var(--state-purpose); }

        .tab-btn.active-tab-waste { border-color: var(--state-waste); background: var(--surface); box-shadow: 0 4px 15px var(--glow-waste); }
        .tab-btn.active-tab-waste .cat-name { color: var(--state-waste); }

        .tab-btn.active-tab-nourish { border-color: var(--state-nourish); background: var(--surface); box-shadow: 0 4px 15px var(--glow-nourish); }
        .tab-btn.active-tab-nourish .cat-name { color: var(--state-nourish); }

        .tab-btn.active-tab-train { border-color: var(--state-train); background: var(--surface); box-shadow: 0 4px 15px var(--glow-train); }
        .tab-btn.active-tab-train .cat-name { color: var(--state-train); }

        .tab-btn.active-tab-recover { border-color: var(--state-recover); background: var(--surface); box-shadow: 0 4px 15px var(--glow-recover); }
        .tab-btn.active-tab-recover .cat-name { color: var(--state-recover); }

        .tab-btn.active .cat-subtext { color: var(--muted); opacity: 0.9; }

        .cat-pulse-wrapper { display: flex; align-items: center; gap: 0.4rem; justify-content: center;}
        .cat-pulse { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; transition: border-color 0.3s;}
        
        .pulse-g { background: var(--win); box-shadow: 0 0 8px var(--win); animation: pulseG 2s infinite ease-in-out; }
        .pulse-y { background: var(--pulse-y); box-shadow: 0 0 8px var(--pulse-y-glow); animation: pulseY 2s infinite ease-in-out; }
        .pulse-r { background: var(--lose); box-shadow: 0 0 8px var(--lose); animation: pulseR 2s infinite ease-in-out; }
        
        @keyframes pulseG { 0% { box-shadow: 0 0 4px var(--win); } 50% { box-shadow: 0 0 12px var(--win); } 100% { box-shadow: 0 0 4px var(--win); } }
        @keyframes pulseY { 0% { box-shadow: 0 0 4px var(--pulse-y-glow); } 50% { box-shadow: 0 0 12px var(--pulse-y-glow); } 100% { box-shadow: 0 0 4px var(--pulse-y-glow); } }
        @keyframes pulseR { 0% { box-shadow: 0 0 4px var(--lose); } 50% { box-shadow: 0 0 12px var(--lose); } 100% { box-shadow: 0 0 4px var(--lose); } }
        
        .cat-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 1.05rem; transition: color 0.3s;}
        .cat-subtext { font-family: 'Barlow', sans-serif; font-size: 0.75rem; font-weight: 400; opacity: 0.7; letter-spacing: 0; text-transform: none; transition: color 0.3s;}
        
        .editable-text { cursor: text; border-bottom: 1px dashed transparent; transition: border-color 0.2s; white-space: nowrap;}
        .editable-text:hover, .editable-text:focus { border-bottom-color: var(--muted); outline: none; }
        
        .delete-icon { opacity: 0; background: none; border: none; color: var(--lose); cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; padding: 0 0.5rem; }
        .habit-row:hover .delete-icon { opacity: 1; }

        .dash-list { display: flex; flex-direction: column; gap: 0.5rem; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .habit-row { display: flex; align-items: center; gap: 1rem; padding: 0.8rem 0; border-bottom: 1px solid var(--border); }
        .habit-row:last-child { border-bottom: none; }
        .habit-check { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: var(--input-bg); transition: all 0.2s; flex-shrink: 0;}
        .habit-check.done { background: var(--fasting); border-color: var(--fasting); }
        .habit-check.done::after { content: '✓'; color: #fff; font-size: 0.8rem; font-weight: bold; }
        .habit-label { font-weight: 500; font-size: 1rem; flex-grow: 1; white-space: normal; word-break: break-word;}
        .alive-dot { width: 8px; height: 8px; background: var(--fasting); border-radius: 50%; box-shadow: 0 0 8px var(--fasting-glow); animation: pulseFasting 2s infinite ease-in-out; display: inline-block; margin-right: 6px; }
        .habit-streak { font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; color: var(--text); font-weight: 700; display: flex; align-items: center; white-space: nowrap;}
        .habit-streak.zero { color: var(--muted); }
        .habit-streak.zero .alive-dot { display: none; }
        .btn-add-habit { background: transparent; border: 1px dashed var(--border); color: var(--muted); width: 100%; padding: 0.8rem; border-radius: 8px; cursor: pointer; font-family: 'Barlow', sans-serif; font-weight: 500; transition: all 0.2s; margin-top: 0.5rem; text-align: left; }
        .btn-add-habit:hover { border-color: var(--text); color: var(--text); }
        
        /* Auth Card */
        .auth-card, .loading-card { max-width: 450px; margin: 4rem auto; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 4rem 2rem; text-align: center; box-shadow: var(--card-shadow); }
        .auth-card h2 { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 2rem; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--text); }
        .auth-btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; padding: 0.8rem 1rem; margin-top: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
        .auth-btn:hover { border-color: #4285F4; }
    </style>
</head>
<body>

<header>
    <div class="controls-cluster">
        <button id="audioToggleBtn" class="icon-btn" onclick="toggleMute()" title="Toggle Sound">
            <svg id="icon-sound-on" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <svg id="icon-sound-off" style="display:none;" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
        </button>

        <button id="fullscreenBtn" class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen Mode">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
            </svg>
        </button>

        <div class="theme-toggle-container" onclick="toggleTheme()" title="Toggle mode">
            <div class="sleek-toggle-track">
                <div class="sleek-toggle-knob">
                    <svg id="icon-sun" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
