    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Barlow', sans-serif; }
        .font-condensed { font-family: 'Barlow Condensed', sans-serif; }
        body {
            transition: background-color 0.2s ease, color 0.2s;
            background: #F9F5EC;
        }
        .dark body { background: #121826; }
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        .card-glow {
            box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 0 0 1px rgba(0,0,0,0.02);
        }
        .dark .card-glow {
            box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
        }
        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 4px currentColor;
        }
        .habit-edit-input {
            background: transparent;
            border-bottom: 1px dashed currentColor;
            outline: none;
            width: auto;
            min-width: 80px;
        }
        .modal-backdrop {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }
        button:active { transform: scale(0.97); transition: 0.05s; }
        .state-btn-active {
            box-shadow: 0 0 0 3px currentColor, 0 4px 12px rgba(0,0,0,0.1);
            transform: scale(1.02);
        }
    </style>
</head>

    <script>
        // ==================== SUPABASE CREDENTIALS (USER PROVIDED) ==================
        const SUPABASE_URL = "https://ambpjxgidojgmwvvjglg.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtYnBqeGdpZG9qZ213dnZqZ2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzQzNTQsImV4cCI6MjA5MDAxMDM1NH0.8TfCIQhAjPChBZn8op5J9ykyMc3hPDJ_vJuUEm3WcP4";
        
        let supabase;
        let currentUser = null;

        let activeState = null;
        let stateStartTime = null;
        let stateTimerInterval = null;
        let currentAudioSource = null;
        let audioCtx = null;
        let audioBuffers = {};
        let stateAccumulated = { purposeful:0, wasteful:0, nourishing:0, training:0, recovering:0 };
        let donutChart = null;
        
        let currentFastStart = null;
        let fastInterval = null;
        
        let habitCategories = ['purposeful','wasteful','nourishing','training','recovering'];
        let habitsMap = {};

        // ==================== Helper functions ====================
        function escapeHtml(str) { 
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});
        }
        
        function loadUserLocalData(userId) {
            const storageKey = `mindful_${userId}`;
            const data = localStorage.getItem(storageKey);
            if(data) {
                const parsed = JSON.parse(data);
                stateAccumulated = parsed.stateAccumulated || { purposeful:0, wasteful:0, nourishing:0, training:0, recovering:0 };
                habitsMap = parsed.habitsMap || getDefaultHabits();
            } else {
                stateAccumulated = { purposeful:0, wasteful:0, nourishing:0, training:0, recovering:0 };
                habitsMap = getDefaultHabits();
            }
            updateDonutChart();
            renderHabitTracker();
        }
        
        function saveUserLocalData(userId) {
            const storageKey = `mindful_${userId}`;
            localStorage.setItem(storageKey, JSON.stringify({ stateAccumulated, habitsMap }));
        }
        
        function getDefaultHabits() {
            return {
                purposeful: [{ id:'p1', name:'Morning intention', streak:0, completedToday:false, lastCompletionDate:null }],
                wasteful: [{ id:'w1', name:'Limit scrolling', streak:0, completedToday:false, lastCompletionDate:null }],
                nourishing: [{ id:'n1', name:'Hydrate well', streak:0, completedToday:false, lastCompletionDate:null }],
                training: [{ id:'t1', name:'Move 15min', streak:0, completedToday:false, lastCompletionDate:null }],
                recovering: [{ id:'r1', name:'Breathwork', streak:0, completedToday:false, lastCompletionDate:null }]
            };
        }
        
        function updateHabitStreak(habit, completedNow) {
            const today = new Date().toDateString();
            if(completedNow) {
                if(!habit.completedToday) {
                    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
                    const lastDate = habit.lastCompletionDate ? new Date(habit.lastCompletionDate).toDateString() : null;
                    if(lastDate === yesterday.toDateString()) habit.streak++;
                    else if(lastDate !== today) habit.streak = 1;
                    habit.completedToday = true;
                    habit.lastCompletionDate = new Date().toISOString();
                }
            } else {
                if(habit.completedToday) habit.completedToday = false;
            }
            return habit;
        }
        
        function getCategoryCompletion(cat) {
            const habits = habitsMap[cat] || [];
            if(!habits.length) return 0;
            const completed = habits.filter(h => h.completedToday).length;
            return Math.round((completed/habits.length)*100);
        }
        
        function updateTabPulseDots() {
            const tabs = document.querySelectorAll('.habit-tab');
            tabs.forEach(tab => {
                const cat = tab.dataset.category;
                const completion = getCategoryCompletion(cat);
                let dotColor = 'bg-red-500'; if(completion===100) dotColor = 'bg-green-500'; else if(completion>0) dotColor = 'bg-yellow-500';
                const dotSpan = tab.querySelector('.pulse-dot');
                if(dotSpan) dotSpan.className = `pulse-dot ${dotColor}`;
            });
        }
        
        function renderHabitTracker() {
            const activeTab = document.querySelector('.habit-tab-active')?.dataset.category || 'purposeful';
            const headerDiv = document.getElementById('habitTabsHeader');
            if(!headerDiv) return;
            headerDiv.innerHTML = '';
            habitCategories.forEach(cat => {
                const completion = getCategoryCompletion(cat);
                let dotColor = 'bg-red-500'; if(completion===100) dotColor = 'bg-green-500'; else if(completion>0) dotColor = 'bg-yellow-500';
                const isActive = (activeTab === cat);
                headerDiv.innerHTML += `<button data-category="${cat}" class="habit-tab ${isActive ? 'habit-tab-active border-b-2 border-[#5c88f2]' : ''} px-4 py-1 text-sm font-medium flex items-center gap-1">${cat.slice(0,4)} <span class="pulse-dot ${dotColor}"></span></button>`;
            });
            document.querySelectorAll('.habit-tab').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.habit-tab').forEach(b => b.classList.remove('habit-tab-active','border-b-2','border-[#5c88f2]'));
                    btn.classList.add('habit-tab-active','border-b-2','border-[#5c88f2]');
                    renderHabitTracker();
                });
            });
            const contentDiv = document.getElementById('habitContent');
            const category = activeTab;
            const habits = habitsMap[category] || [];
            contentDiv.innerHTML = `<h4 class="font-semibold mb-2 capitalize">${category} habits</h4><ul class="space-y-3">` + habits.map((habit, idx) => `
                <li class="flex items-center justify-between bg-white/30 dark:bg-gray-700/30 p-2 rounded-xl">
                    <div class="flex items-center gap-2 flex-1">
                        <input type="checkbox" data-cat="${category}" data-id="${habit.id}" class="habit-checkbox w-5 h-5 rounded" ${habit.completedToday ? 'checked' : ''}>
                        <span class="habit-name-text text-sm" data-cat="${category}" data-id="${habit.id}">${escapeHtml(habit.name)}</span>
                        <input type="text" class="habit-edit-input hidden text-sm" data-cat="${category}" data-id="${habit.id}" value="${escapeHtml(habit.name)}">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-mono">🔥 ${habit.streak}</span>
                        <button class="edit-habit-btn text-xs text-blue-400" data-cat="${category}" data-id="${habit.id}">✎</button>
                    </div>
                </li>
            `).join('') + `</ul><button class="add-habit-btn mt-3 text-sm text-[#5c88f2]" data-cat="${category}">+ Add habit</button>`;
            attachHabitEvents();
        }
        
        function attachHabitEvents() {
            document.querySelectorAll('.habit-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const cat = cb.dataset.cat, id = cb.dataset.id;
                    const habit = habitsMap[cat]?.find(h => h.id === id);
                    if(habit) {
                        updateHabitStreak(habit, cb.checked);
                        if(!cb.checked) habit.completedToday = false;
                        saveUserLocalData(currentUser.id);
                        renderHabitTracker();
                        updateTabPulseDots();
                    }
                });
            });
            document.querySelectorAll('.edit-habit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const cat = btn.dataset.cat, id = btn.dataset.id;
                    const textSpan = document.querySelector(`.habit-name-text[data-cat="${cat}"][data-id="${id}"]`);
                    const editInput = document.querySelector(`.habit-edit-input[data-cat="${cat}"][data-id="${id}"]`);
                    if(textSpan && editInput) {
                        textSpan.classList.add('hidden');
                        editInput.classList.remove('hidden');
                        editInput.focus();
                        const saveEdit = () => {
                            const newName = editInput.value.trim();
                            if(newName) {
                                const habit = habitsMap[cat]?.find(h => h.id === id);
                                if(habit) habit.name = newName;
                                saveUserLocalData(currentUser.id);
                            }
                            renderHabitTracker();
                        };
                        editInput.addEventListener('blur', saveEdit, { once: true });
                        editInput.addEventListener('keypress', (e) => { if(e.key==='Enter') editInput.blur(); });
                    }
                });
            });
            document.querySelectorAll('.add-habit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const cat = btn.dataset.category;
                    const newId = Date.now().toString();
                    habitsMap[cat].push({ id:newId, name:'New habit', streak:0, completedToday:false, lastCompletionDate:null });
                    saveUserLocalData(currentUser.id);
                    renderHabitTracker();
                });
            });
        }
        
        // Audio (Web Audio simple loops)
        async function initAudio() {
            if(audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const createTone = (freq, duration=2) => {
                const sampleRate = audioCtx.sampleRate;
                const length = sampleRate * duration;
                const buffer = audioCtx.createBuffer(1, length, sampleRate);
                const data = buffer.getChannelData(0);
                for(let i=0; i<length; i++) {
                    let t = i / sampleRate;
                    data[i] = Math.sin(2 * Math.PI * freq * t) * 0.3 * Math.exp(-t*0.8);
                }
                return buffer;
            };
            audioBuffers = {
                purposeful: createTone(523.25, 2.5),
                wasteful: createTone(220, 2),
                nourishing: createTone(329.63, 2.2),
                training: createTone(440, 2.4),
                recovering: createTone(196, 3)
            };
        }
        function playStateAudio(stateKey) {
            if(!audioCtx) return;
            if(currentAudioSource) { try { currentAudioSource.stop(); } catch(e){} }
            const buffer = audioBuffers[stateKey];
            if(buffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;
                source.connect(audioCtx.destination);
                source.start();
                currentAudioSource = source;
            }
        }
        function stopAudio() {
            if(currentAudioSource) { try{ currentAudioSource.stop(); }catch(e){} currentAudioSource = null; }
        }
        
        function stopActiveStateAndRecord() {
            if(activeState && stateStartTime) {
                const elapsedSec = Math.floor((Date.now() - stateStartTime) / 1000);
                if(elapsedSec > 0) {
                    stateAccumulated[activeState] = (stateAccumulated[activeState] || 0) + elapsedSec;
                    saveUserLocalData(currentUser.id);
                    updateDonutChart();
                }
            }
            if(stateTimerInterval) clearInterval(stateTimerInterval);
            stopAudio();
            activeState = null; stateStartTime = null;
            document.getElementById('activeStateLabel').innerText = '—';
            document.getElementById('activeTimerDisplay').innerText = '00:00:00';
        }
        
        function startState(stateKey) {
            if(!currentUser) return;
            stopActiveStateAndRecord();
            activeState = stateKey;
            stateStartTime = Date.now();
            stateTimerInterval = setInterval(() => {
                if(activeState && stateStartTime) {
                    const diff = Math.floor((Date.now() - stateStartTime)/1000);
                    const h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60), s = diff%60;
                    document.getElementById('activeTimerDisplay').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }
            }, 1000);
            document.getElementById('activeStateLabel').innerText = stateKey.toUpperCase();
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            playStateAudio(stateKey);
        }
        
        function updateDonutChart() {
            if(!donutChart) return;
            const values = habitCategories.map(c => stateAccumulated[c] || 0);
            donutChart.data.datasets[0].data = values;
            donutChart.update();
        }
        
        // Fasting stages
        const stages = [
            { name:'Fed', minH:0, maxH:4, desc:'Energy from meal', color:'#f5c43d' },
            { name:'Early Fasting', minH:4, maxH:8, desc:'Insulin drops', color:'#8d94e5' },
            { name:'Ketosis', minH:8, maxH:12, desc:'Fat burning', color:'#47d18c' },
            { name:'Autophagy', minH:12, maxH:16, desc:'Cellular clean', color:'#5c88f2' },
            { name:'Deep Fasting', minH:16, maxH:24, desc:'GH increase', color:'#8d94e5' },
            { name:'Immune Regeneration', minH:24, maxH:48, desc:'Stem cell boost', color:'#fc7281' }
        ];
        function updateFastingUI() {
            if(!currentFastStart) { 
                document.getElementById('fastElapsed').innerText='0h'; 
                document.getElementById('fastStageName').innerText='Not started'; 
                document.getElementById('fastStageDesc').innerText='Start a fast'; 
                const ring = document.getElementById('fastRing'); 
                if(ring) ring.style.strokeDashoffset = '263.89'; 
                return; 
            }
            const elapsedH = (Date.now() - currentFastStart) / (1000*3600);
            document.getElementById('fastElapsed').innerText = elapsedH.toFixed(1)+'h';
            let stage = stages[0];
            for(let s of stages) if(elapsedH >= s.minH && elapsedH < s.maxH) { stage = s; break; }
            if(elapsedH >= 48) stage = stages[5];
            document.getElementById('fastStageName').innerText = stage.name;
            document.getElementById('fastStageDesc').innerText = stage.desc;
            const maxH = stage.maxH === 48 ? 48 : stage.maxH;
            let progress = Math.min(1, (elapsedH - stage.minH)/(maxH - stage.minH));
            if(stage.name === 'Fed') progress = elapsedH/4;
            const circumference = 263.89;
            const offset = circumference * (1 - progress);
            const ring = document.getElementById('fastRing');
            ring.style.strokeDashoffset = offset;
            ring.setAttribute('stroke', stage.color);
        }
        function startFast() {
            if(!currentUser) return;
            currentFastStart = Date.now();
            if(fastInterval) clearInterval(fastInterval);
            fastInterval = setInterval(updateFastingUI, 1000);
            updateFastingUI();
        }
        async function endFastToSupabase() {
            if(!currentFastStart || !currentUser) return;
            const endTime = new Date().toISOString();
            const startTime = new Date(currentFastStart).toISOString();
            const durationHours = (Date.now() - currentFastStart) / (3600000);
            try {
                const { error } = await supabase.from('fasting_sessions').insert([{ user_id: currentUser.id, start_time: startTime, end_time: endTime, duration_hours: durationHours }]);
                if(error) console.error('Supabase insert error:', error);
            } catch(e) { console.warn('Table might not exist yet'); }
            currentFastStart = null;
            if(fastInterval) clearInterval(fastInterval);
            updateFastingUI();
        }
        
        // Supabase auth
        async function initSupabase() {
            const { createClient } = supabase;
            const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            return sb;
        }
        
        async function handleGoogleLogin() {
            if(!supabase) { alert('Supabase not ready'); return; }
            const { error } = await supabase.auth.signInWithOAuth({ provider: 'google' });
            if(error) alert(error.message);
        }
        
        async function setupAuthListener() {
            const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
                if(session?.user) {
                    currentUser = session.user;
                    document.getElementById('authContainer').classList.add('hidden');
                    document.getElementById('appContainer').classList.remove('hidden');
                    document.getElementById('userAvatar').src = currentUser.user_metadata?.avatar_url || 'https://ui-avatars.com/api/?background=5c88f2&color=fff&name=User';
                    loadUserLocalData(currentUser.id);
                    renderHabitTracker();
                    updateTabPulseDots();
                } else {
                    currentUser = null;
                    document.getElementById('authContainer').classList.remove('hidden');
                    document.getElementById('appContainer').classList.add('hidden');
                    stopActiveStateAndRecord();
                    if(fastInterval) clearInterval(fastInterval);
                }
            });
        }
        
        // DOM ready
        window.addEventListener('DOMContentLoaded', async () => {
            supabase = await initSupabase();
            if(supabase) await setupAuthListener();
            
            // UI event listeners
            document.getElementById('googleSignInBtn')?.addEventListener('click', handleGoogleLogin);
            document.getElementById('signOutBtn')?.addEventListener('click', async () => { if(supabase) await supabase.auth.signOut(); });
            document.getElementById('themeToggle')?.addEventListener('click', () => { document.documentElement.classList.toggle('dark'); });
            
            document.querySelectorAll('.state-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if(!currentUser) return;
                    await initAudio();
                    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                    const state = btn.dataset.state;
                    startState(state);
                });
            });
            document.getElementById('stopTimerBtn')?.addEventListener('click', () => { stopActiveStateAndRecord(); });
            document.getElementById('startFastBtn')?.addEventListener('click', () => { if(currentUser) startFast(); });
            const modal = document.getElementById('frictionModal');
            document.getElementById('endFastBtn')?.addEventListener('click', () => { if(currentFastStart) modal.classList.remove('hidden'); else alert('No active fast'); });
            document.getElementById('confirmEndFast')?.addEventListener('click', async () => { await endFastToSupabase(); modal.classList.add('hidden'); });
            document.getElementById('cancelEndFast')?.addEventListener('click', () => { modal.classList.add('hidden'); });
            document.getElementById('modalBackdrop')?.addEventListener('click', () => { modal.classList.add('hidden'); });
            
            // Chart
            const ctx = document.getElementById('stateDonutChart')?.getContext('2d');
            if(ctx) {
                donutChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels: ['Purpose','Waste','Nourish','Train','Recover'], datasets: [{ data: [0,0,0,0,0], backgroundColor: ['#5c88f2','#fc7281','#f5c43d','#47d18c','#8d94e5'], borderWidth: 0 }] },
                    options: { cutout: '65%', plugins: { legend: { position: 'bottom', labels: { font: { size: 10 } } } } }
                });
            }
        });
    </script>
</body>
</html>
