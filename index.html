<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful Rhythm | Live the Moment</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="logo-mindful-rhythm.png">
    <link rel="apple-touch-icon" href="logo-mindful-rhythm.png">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* --- Core Theme Variables --- */
        [data-theme="dark"] {
            --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
            --text: #e8e8f0; --muted: #6b6b80; 
            --accent: #22c55e; --win: #3ecf7a; --lose: #ef4444;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.5);
            --toggle-bg: #1e1e2e; --input-bg: #13131a;
            --fasting: #22c55e; --fasting-glow: rgba(34, 197, 94, 0.35);
            --feasting: #eab308; --feasting-glow: rgba(234, 179, 8, 0.15);
            --chart-grid: #1e1e2e;
            --pulse-y: #eab308; --pulse-y-glow: rgba(234, 179, 8, 0.4);
            --toggle-track-bg: #1e1e2e; --toggle-knob-bg: #e8e8f0; --toggle-icon-color: #0a0a0f;
            --state-purpose: #5c88f2; --glow-purpose: rgba(92, 136, 242, 0.2);
            --state-waste: #fc7281;   --glow-waste: rgba(252, 114, 129, 0.2);
            --state-nourish: #f5c43d; --glow-nourish: rgba(245, 196, 61, 0.2);
            --state-train: #47d18c;   --glow-train: rgba(71, 209, 140, 0.2);
            --state-recover: #8d94e5; --glow-recover: rgba(141, 148, 229, 0.2);
        }
        [data-theme="light"] {
            --bg: #f2f2f7; --surface: #ffffff; --border: #dde0ea;
            --text: #0f0f1a; --muted: #8888a0; 
            --accent: #16a34a; --win: #1a8a4a; --lose: #d63030;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
            --toggle-bg: #dde0ea; --input-bg: #ffffff;
            --fasting: #16a34a; --fasting-glow: rgba(22, 163, 74, 0.35);
            --feasting: #d97706; --feasting-glow: rgba(217, 119, 6, 0.15);
            --chart-grid: #e2e8f0;
            --pulse-y: #d97706; --pulse-y-glow: rgba(217, 119, 6, 0.4);
            --toggle-track-bg: #dde0ea; --toggle-knob-bg: #0f0f1a; --toggle-icon-color: #ffffff;
            --state-purpose: #5c88f2; --glow-purpose: rgba(92, 136, 242, 0.2);
            --state-waste: #fc7281;   --glow-waste: rgba(252, 114, 129, 0.2);
            --state-nourish: #f5c43d; --glow-nourish: rgba(245, 196, 61, 0.2);
            --state-train: #47d18c;   --glow-train: rgba(71, 209, 140, 0.2);
            --state-recover: #8d94e5; --glow-recover: rgba(141, 148, 229, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding: 0 0 4rem 0; transition: background 0.25s, color 0.25s; }

        /* Modal & UI Elements */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2.5rem 2rem; max-width: 400px; width: 90%; text-align: center; box-shadow: var(--card-shadow); }
        .modal-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.8rem; text-transform: uppercase; color: var(--text); margin-bottom: 0.5rem; }
        .modal-desc { color: var(--muted); margin-bottom: 2rem; font-size: 1rem; }
        .modal-actions { display: flex; gap: 1rem; justify-content: center; }
        .modal-btn { padding: 0.8rem 1.5rem; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: all 0.2s; border: none; flex: 1;}
        .btn-cancel { background: transparent; border: 2px solid var(--border); color: var(--text); }
        .btn-confirm { background: var(--lose); color: #fff; border: 2px solid var(--lose); }

        /* Symmetrical Centered Header */
        header { 
            background: var(--bg); margin-bottom: 2rem; border-bottom: 1px solid var(--border); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 2.5rem 1.5rem; position: relative; z-index: 900;
        }
        .logo-brand-container { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 0.4rem; }
        .header-logo-img { height: 45px; width: auto; object-fit: contain; }
        .controls-cluster { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; width: 100%; flex-wrap: wrap; }
        .header-titles { text-align: center; width: 100%; }
        .header-titles h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: clamp(2.2rem, 5vw, 3rem); letter-spacing: 0.05em; text-transform: uppercase; color: var(--text); line-height: 1; }
        .header-titles p { color: var(--muted); font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.5rem; }
        .date-time-display { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
        #currentDate { font-size: 0.9rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        #currentTime { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }

        /* Interactive Toggles */
        .icon-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; transition: color 0.2s; display: flex; align-items: center; justify-content: center; padding: 0.2rem; }
        .theme-toggle-container { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; cursor: pointer; user-select: none;}
        .sleek-toggle-track { width: 50px; height: 28px; border-radius: 16px; background: var(--toggle-track-bg); position: relative; transition: background 0.3s ease; }
        .sleek-toggle-knob { width: 20px; height: 20px; border-radius: 50%; background: var(--toggle-knob-bg); position: absolute; top: 4px; left: 4px; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); display: flex; align-items: center; justify-content: center; color: var(--toggle-icon-color); }
        [data-theme="dark"] .sleek-toggle-knob { transform: translateX(22px); }

        /* Profile & Auth */
        .header-profile-menu { display: flex; align-items: center; gap: 0.6rem; cursor: pointer; border: 1px solid var(--border); background: var(--surface); border-radius: 20px; padding: 0.3rem 0.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .user-avatar-header { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 2px solid var(--bg); }
        .user-name-header { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 1rem; color: var(--text); }
        .btn-text-logout-header { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.05em; text-transform: uppercase; color: #000; background: #fff; border: 2px solid #000; border-radius: 20px; padding: 0.3rem 1.2rem; cursor: pointer; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
        .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; box-shadow: var(--card-shadow); margin-bottom: 2rem; position: relative;}
        .card-title-centered { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); }
        .dynamic-name { color: var(--accent); }
        .card-header-flex { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 1rem; margin-bottom: 1.5rem; width: 100%; }
        .card-header-flex .card-title-centered { grid-column: 2; text-align: center; }
        .action-cluster-header.abs-right { grid-column: 3; justify-self: end; display: flex; gap: 0.4rem; background: var(--input-bg); border: 1px solid var(--border); border-radius: 20px; padding: 0.25rem 0.5rem; }

        /* Fasting Layout */
        .hero-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; gap: 1rem; }
        .fast-ring { width: 100%; max-width: 320px; aspect-ratio: 1; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; position: relative; }
        .fast-time { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(3rem, 12vw, 4.8rem); font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; }
        .fasting-mode .fast-ring { animation: pulseFasting 2.5s infinite ease-in-out; }
        .feasting-mode .fast-ring { animation: pulseFeasting 4s infinite ease-in-out; }
        @keyframes pulseFasting { 0% { box-shadow: 0 0 20px var(--fasting-glow); } 50% { box-shadow: 0 0 65px var(--fasting-glow), 0 0 15px var(--fasting); } 100% { box-shadow: 0 0 20px var(--fasting-glow); } }
        @keyframes pulseFeasting { 0% { box-shadow: 0 0 15px var(--feasting-glow); } 50% { box-shadow: 0 0 45px var(--feasting-glow); } 100% { box-shadow: 0 0 15px var(--feasting-glow); } }

        /* Moment Dashboard */
        .moment-dashboard-layout { display: flex; gap: 3rem; align-items: center; justify-content: space-between; }
        .moment-timers-col { flex: 1; display: flex; flex-direction: column; gap: 0.75rem; }
        .moment-btn { background: var(--input-bg); border: 3px solid var(--border); border-radius: 12px; padding: 1rem 1.5rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s ease; }
        .moment-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.15rem; text-transform: uppercase; color: var(--muted); }
        .moment-timer-text { font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 1.15rem; tabular-nums; color: var(--text); }
        .moment-donut-col { width: 300px; flex-shrink: 0; position: relative; }
        .moment-donut-wrapper { width: 100%; aspect-ratio: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        /* Empty donut center layout */
        .donut-center-content { position: absolute; display: flex; align-items: center; justify-content: center; z-index: 10; pointer-events: none; }

        /* Habits UI */
        .tabs-scroll-container { display: flex; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1rem; }
        .tabs-header { display: flex; gap: 0.75rem; overflow-x: auto; scrollbar-width: none; align-items: center; justify-content: center; flex-grow: 1; }
        .tab-btn { background: var(--input-bg); border: 3px solid var(--border); padding: 0.6rem 1.2rem; border-radius: 12px; cursor: pointer; }
        .cat-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; text-transform: uppercase; }
        .habit-row { display: flex; align-items: center; gap: 1rem; padding: 0.8rem 0; border-bottom: 1px solid var(--border); }
        .habit-check { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; }
        .habit-check.done { background: var(--fasting); border-color: var(--fasting); }
        .habit-label { flex-grow: 1; font-weight: 500; }
        
        /* Layout Queries */
        @media (max-width: 768px) {
            .moment-dashboard-layout { flex-direction: column; }
            .card-header-flex { display: flex; flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div id="fastingModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
        <h3 class="modal-title">Break Fasting?</h3>
        <p class="modal-desc">Are you sure you want to end your current fast?</p>
        <div class="modal-actions">
            <button class="modal-btn btn-cancel" onclick="closeFastingModal()">Cancel</button>
            <button class="modal-btn btn-confirm" onclick="executeToggleFasting()">Confirm</button>
        </div>
    </div>
</div>

<header>
    <div class="controls-cluster">
        <div id="headerProfileMenu" class="header-profile-menu" onclick="toggleHeaderLogout()" style="display: none;">
            <img id="userAvatarHeader" class="user-avatar-header" src="" alt="Profile" crossorigin="anonymous">
            <span id="userNameHeader" class="user-name-header">User</span>
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </div>
        <button id="logoutBtnHeader" class="btn-text-logout-header" style="display: none;" onclick="signOut()">Log Out</button>
        <button class="icon-btn" onclick="toggleFullscreen()"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg></button>
        <div class="theme-toggle-container" onclick="toggleTheme()">
            <div class="sleek-toggle-track"><div class="sleek-toggle-knob">✦</div></div>
        </div>
    </div>
    <div class="header-titles">
        <div class="logo-brand-container">
            <img src="logo-mindful-rhythm.png" alt="Logo" class="header-logo-img">
            <h1>Mindful Rhythm</h1>
        </div>
        <p>Live the Moment</p>
        <div class="date-time-display">
            <span id="currentDate"></span>
            <span id="currentTime"></span>
        </div>
    </div>
</header>

<div class="container">
    <div id="loadingView" class="dash-card"><h2 style="text-align:center; color:var(--muted);">Syncing Systems...</h2></div>
    <div id="loginView" class="dash-card" style="display:none; text-align:center; padding: 4rem 2rem;">
        <h2 style="font-family:'Barlow Condensed'; font-size:2rem; margin-bottom:1rem;">CONNECT ACCOUNT</h2>
        <button onclick="signInWithGoogle()" style="padding:1rem 2rem; border-radius:8px; border:1px solid var(--border); cursor:pointer; font-weight:600;">Continue with Google</button>
    </div>

    <div id="mainContent" style="display: none;">
        <div id="fastingHero" class="dash-card feasting-mode">
            <div class="hero-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <span class="hero-title" id="miniHeroTitle">Feasting Window</span>
                <span class="fast-time" id="fastTimeDisplay">00:00</span>
            </div>
            <div class="hero-content">
                <div class="fast-ring"><span class="fast-time" id="fastTimeDisplayLarge">00:00</span></div>
                <div style="margin-bottom:2rem;">
                    <h3 id="stageTitle" class="card-title-centered">Loading...</h3>
                    <p id="stageDesc" style="color:var(--muted);">Calculating phase...</p>
                </div>
                <button id="toggleFastBtn" class="action-btn" onclick="attemptToggleFasting(event)">Start Fasting</button>
                <div class="integrated-chart-section"><canvas id="fastingChart" style="height:200px;"></canvas></div>
            </div>
        </div>

        <div id="momentCard" class="dash-card">
            <div class="card-header-flex">
                <h3 class="card-title-centered"><span id="momentUserName" class="dynamic-name">USER</span>'S MOMENT</h3>
            </div>
            <div class="moment-dashboard-layout">
                <div class="moment-timers-col">
                    <button class="moment-btn" onclick="toggleMomentState('purpose')"><span>Purposeful</span><span id="time-purpose">00:00:00</span></button>
                    <button class="moment-btn" onclick="toggleMomentState('waste')"><span>Wasteful</span><span id="time-waste">00:00:00</span></button>
                    <button class="moment-btn" onclick="toggleMomentState('nourish')"><span>Nourishing</span><span id="time-nourish">00:00:00</span></button>
                    <button class="moment-btn" onclick="toggleMomentState('train')"><span>Training</span><span id="time-train">00:00:00</span></button>
                    <button class="moment-btn" onclick="toggleMomentState('recover')"><span>Recovering</span><span id="time-recover">00:00:00</span></button>
                </div>
                <div class="moment-donut-col">
                    <div class="moment-donut-wrapper">
                        <canvas id="momentDonutChart"></canvas>
                        <div class="donut-center-content"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="habitCard" class="dash-card">
            <div class="card-header-flex"><h3 class="card-title-centered"><span id="habitUserName" class="dynamic-name">USER</span>'S HABITS</h3></div>
            <div class="tabs-header" id="dynamicTabsHeader"></div>
            <div id="dynamicHabitsContainer"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ambpjxgidojgmwvvjglg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtYnBqeGdpZG9qZ213dnZqZ2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzQzNTQsImV4cCI6MjA5MDAxMDM1NH0.8TfCIQhAjPChBZn8op5J9ykyMc3hPDJ_vJuUEm3WcP4';
    const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
    let currentUser = null;

    function updateClock() {
        const now = new Date();
        document.getElementById('currentDate').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        document.getElementById('currentTime').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateClock, 1000); updateClock();

    async function checkUser() {
        if (!supabaseClient) return;
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            currentUser = session.user;
            const meta = currentUser.user_metadata;
            document.getElementById('userAvatarHeader').src = meta.avatar_url;
            document.getElementById('userNameHeader').innerText = meta.full_name.split(' ')[0];
            document.getElementById('headerProfileMenu').style.display = 'flex';
            document.getElementById('momentUserName').innerText = meta.full_name.split(' ')[0].toUpperCase();
            document.getElementById('habitUserName').innerText = meta.full_name.split(' ')[0].toUpperCase();
            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            initFastingTracker(); renderHabitsUI(); initMomentStates();
        } else {
            document.getElementById('loadingView').style.display = 'none';
            document.getElementById('loginView').style.display = 'block';
        }
    }

    async function signInWithGoogle() { await supabaseClient.auth.signInWithOAuth({ provider: 'google' }); }
    async function signOut() { await supabaseClient.auth.signOut(); window.location.reload(); }
    function toggleTheme() { const h = document.documentElement; h.setAttribute('data-theme', h.getAttribute('data-theme')==='dark'?'light':'dark'); }
    function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
    function toggleHeaderLogout() { const b = document.getElementById('logoutBtnHeader'); b.style.display = b.style.display==='none'?'block':'none'; }

    // Moment logic
    const momentStatesData = { purpose: { ms: 0, color: '#5c88f2' }, waste: { ms: 0, color: '#fc7281' }, nourish: { ms: 0, color: '#f5c43d' }, train: { ms: 0, color: '#47d18c' }, recover: { ms: 0, color: '#8d94e5' } };
    let activeMomentKey = null, momentLastTickMs = null, momentDonutChart = null;

    function initMomentStates() {
        const ctx = document.getElementById('momentDonutChart').getContext('2d');
        momentDonutChart = new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: [1,1,1,1,1], backgroundColor: Object.values(momentStatesData).map(d=>d.color), borderWidth: 0 }] }, options: { cutout: '82%', plugins: { legend: { display: false } } } });
        setInterval(() => {
            if (activeMomentKey && momentLastTickMs) {
                const now = Date.now(); momentStatesData[activeMomentKey].ms += (now - momentLastTickMs); momentLastTickMs = now;
                const sec = Math.floor(momentStatesData[activeMomentKey].ms/1000);
                document.getElementById(`time-${activeMomentKey}`).innerText = new Date(sec * 1000).toISOString().substr(11, 8);
                momentDonutChart.data.datasets[0].data = Object.values(momentStatesData).map(d=>d.ms); momentDonutChart.update();
            }
        }, 1000);
    }
    function toggleMomentState(key) { if(activeMomentKey===key) activeMomentKey=null; else { activeMomentKey=key; momentLastTickMs=Date.now(); } }

    // Habit logic
    let categories = [{ id: 'c1', name: 'Purpose', habits: [{ name: 'PADI Study', done: true }] }];
    function renderHabitsUI() {
        const h = document.getElementById('dynamicTabsHeader');
        h.innerHTML = categories.map(c => `<button class="tab-btn">${c.name}</button>`).join('');
        document.getElementById('dynamicHabitsContainer').innerHTML = categories[0].habits.map(hab => `<div class="habit-row"><div class="habit-check ${hab.done?'done':''}"></div><span class="habit-label">${hab.name}</span></div>`).join('');
    }

    // Fasting logic
    let isFasting = false, startTime = Date.now();
    function initFastingTracker() {
        setInterval(() => {
            const sec = Math.floor((Date.now() - startTime)/1000);
            const h = String(Math.floor(sec/3600)).padStart(2,'0'), m = String(Math.floor((sec%3600)/60)).padStart(2,'0');
            document.getElementById('fastTimeDisplay').innerText = `${h}:${m}`;
            document.getElementById('fastTimeDisplayLarge').innerText = `${h}:${m}`;
        }, 1000);
        new Chart(document.getElementById('fastingChart'), { type:'line', data:{ labels:['M','T','W','T','F','S','S'], datasets:[{data:[14,16,15,18,17,16,14], borderColor:'#16a34a', fill:true}] }, options:{ maintainAspectRatio:false, plugins:{legend:{display:false}} } });
    }
    function attemptToggleFasting() { document.getElementById('fastingModal').style.display='flex'; }
    function closeFastingModal() { document.getElementById('fastingModal').style.display='none'; }
    function executeToggleFasting() { isFasting = !isFasting; startTime=Date.now(); closeFastingModal(); }

    checkUser();
</script>
</body>
</html>
