<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Mindful Rhythm | Live the Moment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Barlow', sans-serif; }
        .font-condensed { font-family: 'Barlow Condensed', sans-serif; }
        body { transition: background-color 0.2s ease; background: #F9F5EC; }
        .dark body { background: #121826; }
        .progress-ring__circle { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .card-glow { box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 0 0 1px rgba(0,0,0,0.02); }
        .dark .card-glow { box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05); }
        .pulse-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; box-shadow: 0 0 4px currentColor; }
        .habit-edit-input { background: transparent; border-bottom: 1px dashed currentColor; outline: none; width: auto; min-width: 80px; }
        .modal-backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        button:active { transform: scale(0.97); transition: 0.05s; }
        .state-btn-active { box-shadow: 0 0 0 3px currentColor, 0 4px 12px rgba(0,0,0,0.1); transform: scale(1.02); }
    </style>
</head>
<body class="bg-[#F9F5EC] dark:bg-[#121826] text-gray-800 dark:text-gray-100 pb-8">

    <div id="authContainer" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm rounded-3xl p-8 text-center shadow-xl">
            <h1 class="text-4xl font-bold font-condensed tracking-wide">🎧 Mindful Rhythm</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2">Live the Moment</p>
            <button id="googleSignInBtn" class="mt-8 w-full bg-[#5c88f2] hover:bg-[#4a73d9] text-white font-semibold py-3 rounded-2xl flex items-center justify-center gap-3 transition">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="white" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="white" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="white" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="white" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Sign in with Google
            </button>
            <p class="text-xs text-gray-400 mt-6">Make sure Google provider is enabled in Supabase</p>
            <div id="authDebug" class="mt-4 text-xs text-red-500"></div>
        </div>
    </div>

    <div id="appContainer" class="max-w-lg mx-auto px-4 py-5 hidden">
        <!-- same app content as before, omitted for brevity, but you can copy from previous full version -->
        <div class="flex justify-between items-center mb-5">
            <h1 class="text-2xl font-bold font-condensed tracking-wide">🌿 Mindful Rhythm</h1>
            <div class="flex gap-3 items-center">
                <button id="themeToggle" class="text-2xl w-10 h-10 rounded-full bg-white/40 dark:bg-gray-700/40 flex items-center justify-center">🌙</button>
                <button id="signOutBtn" class="text-sm bg-gray-200 dark:bg-gray-700 px-3 py-1.5 rounded-full">🚪 Exit</button>
            </div>
        </div>
        <!-- ... rest of the app (same as previous full HTML) ... -->
    </div>

    <script>
        const SUPABASE_URL = "https://ambpjxgidojgmwvvjglg.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtYnBqeGdpZG9qZ213dnZqZ2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzQzNTQsImV4cCI6MjA5MDAxMDM1NH0.8TfCIQhAjPChBZn8op5J9ykyMc3hPDJ_vJuUEm3WcP4";
        
        let supabase;
        let currentUser = null;

        async function initSupabase() {
            const { createClient } = supabaseJs;
            const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            return sb;
        }

        async function handleGoogleLogin() {
            const debugDiv = document.getElementById('authDebug');
            try {
                if (!supabase) {
                    debugDiv.innerText = "Supabase client not initialized";
                    return;
                }
                const { data, error } = await supabase.auth.signInWithOAuth({ 
                    provider: 'google',
                    options: { redirectTo: window.location.origin + window.location.pathname }
                });
                if (error) {
                    debugDiv.innerText = "Auth error: " + error.message;
                    console.error(error);
                } else {
                    console.log("Redirecting to Google...", data);
                }
            } catch (err) {
                debugDiv.innerText = "Exception: " + err.message;
                console.error(err);
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            // Expose supabaseJs globally (from CDN)
            window.supabaseJs = supabase;
            supabase = await initSupabase();
            
            // Check auth session
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('authContainer').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                // load app...
            }
            
            document.getElementById('googleSignInBtn').addEventListener('click', handleGoogleLogin);
        });
    </script>
</body>
</html>
