<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful Rhythm | Live the Moment</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- Core Theme Variables --- */
        [data-theme="dark"] {
            --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
            --text: #e8e8f0; --muted: #6b6b80; 
            --accent: #22c55e; --win: #3ecf7a; --lose: #ef4444;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.5);
            --toggle-bg: #1e1e2e; --input-bg: #13131a;
            --fasting: #22c55e; --fasting-glow: rgba(34, 197, 94, 0.35);
            --feasting: #eab308; --feasting-glow: rgba(234, 179, 8, 0.15);
            --chart-grid: #1e1e2e;
            
            /* Neutral Tab Active Colors */
            --tab-active-bg: #e8e8f0;
            --tab-active-text: #0a0a0f;
            --pulse-y: #eab308;
            --pulse-y-glow: rgba(234, 179, 8, 0.4);

            /* Sleek Toggle Colors */
            --toggle-track-bg: #1e1e2e;
            --toggle-knob-bg: #e8e8f0;
            --toggle-icon-color: #0a0a0f;

            /* Muted/Professional Moment States Colors */
            --state-purpose: #607d8b; /* Blue Grey */
            --glow-purpose: rgba(96, 125, 139, 0.15);
            --state-waste: #b06b6b;   /* Muted Rose */
            --glow-waste: rgba(176, 107, 107, 0.15);
            --state-nourish: #b89563; /* Burnished Gold */
            --glow-nourish: rgba(184, 149, 99, 0.15);
            --state-train: #749c7e;   /* Sage Green */
            --glow-train: rgba(116, 156, 126, 0.15);
            --state-recover: #8a7b9e; /* Muted Lavender */
            --glow-recover: rgba(138, 123, 158, 0.15);
        }

        [data-theme="light"] {
            --bg: #f2f2f7; --surface: #ffffff; --border: #dde0ea;
            --text: #0f0f1a; --muted: #8888a0; 
            --accent: #16a34a; --win: #1a8a4a; --lose: #d63030;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
            --toggle-bg: #dde0ea; --input-bg: #ffffff;
            --fasting: #16a34a; --fasting-glow: rgba(22, 163, 74, 0.35);
            --feasting: #d97706; --feasting-glow: rgba(217, 119, 6, 0.15);
            --chart-grid: #e2e8f0;
            
            /* Neutral Tab Active Colors */
            --tab-active-bg: #0f0f1a;
            --tab-active-text: #ffffff;
            --pulse-y: #d97706;
            --pulse-y-glow: rgba(217, 119, 6, 0.4);

            /* Sleek Toggle Colors */
            --toggle-track-bg: #dde0ea;
            --toggle-knob-bg: #0f0f1a;
            --toggle-icon-color: #ffffff;

            /* Muted/Professional Moment States Colors */
            --state-purpose: #455a64;
            --glow-purpose: rgba(69, 90, 100, 0.15);
            --state-waste: #9e5050;
            --glow-waste: rgba(158, 80, 80, 0.15);
            --state-nourish: #a8824f;
            --glow-nourish: rgba(168, 130, 79, 0.15);
            --state-train: #557a5e;
            --glow-train: rgba(85, 122, 94, 0.15);
            --state-recover: #6a5b7d;
            --glow-recover: rgba(106, 91, 125, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Barlow', sans-serif;
            min-height: 100vh; padding: 0 0 4rem 0;
            transition: background 0.25s, color 0.25s;
        }

        /* --- Header --- */
        header {
            text-align: center; position: relative; z-index: 900;
            background: var(--bg); padding: 2rem 1.5rem; margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900; font-size: clamp(2.2rem, 5vw, 3rem);
            letter-spacing: 0.05em; text-transform: uppercase;
            color: var(--text); line-height: 1; margin-bottom: 0.4rem;
        }
        header p { color: var(--muted); font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase; }

        /* Sleek Toggle */
        .theme-toggle-wrapper { position: absolute; top: 1.5rem; right: 1.5rem; }
        .theme-toggle-container { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; cursor: pointer; user-select: none; }
        .theme-toggle-label { font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); transition: color 0.2s;}
        .theme-toggle-container:hover .theme-toggle-label { color: var(--text); }
        
        .sleek-toggle-track { width: 58px; height: 32px; border-radius: 16px; background: var(--toggle-track-bg); position: relative; transition: background 0.3s ease; }
        .sleek-toggle-knob { 
            width: 24px; height: 24px; border-radius: 50%; background: var(--toggle-knob-bg); 
            position: absolute; top: 4px; left: 4px; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1), background 0.3s ease; 
            display: flex; align-items: center; justify-content: center; color: var(--toggle-icon-color);
        }
        [data-theme="dark"] .sleek-toggle-knob { transform: translateX(26px); }
        
        @media (max-width: 600px) { 
            .theme-toggle-label { display: none; } 
            .theme-toggle-wrapper { top: 1rem; right: 1rem; }
            header { padding: 1.5rem 1rem; }
        }

        /* Centered User Profile */
        .center-profile { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 0.4rem; margin-top: 1.5rem; animation: fadeIn 0.5s ease; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid var(--surface); box-shadow: 0 0 0 1px var(--border); }
        .user-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 1.1rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text); cursor: pointer; transition: color 0.2s; }
        .user-name:hover { color: var(--fasting); }
        .btn-text-logout { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 0.75rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); cursor: pointer; border: 1px solid var(--border); background: var(--surface); border-radius: 12px; padding: 0.3rem 0.8rem; transition: all 0.2s; animation: fadeIn 0.2s ease; }
        .btn-text-logout:hover { color: var(--lose); border-color: var(--lose); }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

        /* --- Generic Dash Card --- */
        .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; box-shadow: var(--card-shadow); margin-bottom: 2rem; transition: all 0.4s ease; }
        .card-title-centered { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); margin-bottom: 1.5rem; }

        /* --- Fasting Hero --- */
        .hero-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .dash-card:not(.collapsed) .hero-header { border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 2rem; }
        .hero-header-left { display: flex; align-items: center; gap: 1rem; }
        .hero-header-right { display: flex; align-items: center; gap: 1rem; }

        .mini-pulse { width: 14px; height: 14px; border-radius: 50%; }
        .fasting-mode .mini-pulse { background: var(--fasting); box-shadow: 0 0 10px var(--fasting-glow); animation: pulseFasting 2.5s infinite ease-in-out; }
        .feasting-mode .mini-pulse { background: var(--feasting); box-shadow: 0 0 10px var(--feasting-glow); animation: pulseFeasting 4s infinite ease-in-out; }

        .hero-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); }
        .mini-time { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.4rem; tabular-nums; color: var(--muted); letter-spacing: 0.05em;}
        .dash-card:not(.collapsed) .mini-time { display: none; }

        .chevron-icon { width: 24px; height: 24px; color: var(--muted); transition: transform 0.3s ease; }
        .dash-card.collapsed .chevron-icon { transform: rotate(-90deg); }

        .hero-content { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .dash-card.collapsed .hero-content { display: none; }
        
        .fast-ring { width: 320px; height: 320px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; position: relative; }
        
        @keyframes pulseFasting { 0% { box-shadow: 0 0 20px var(--fasting-glow); } 50% { box-shadow: 0 0 65px var(--fasting-glow), 0 0 15px var(--fasting); } 100% { box-shadow: 0 0 20px var(--fasting-glow); } }
        @keyframes pulseFeasting { 0% { box-shadow: 0 0 15px var(--feasting-glow); } 50% { box-shadow: 0 0 45px var(--feasting-glow); } 100% { box-shadow: 0 0 15px var(--feasting-glow); } }

        .fasting-mode .fast-ring { animation: pulseFasting 2.5s infinite ease-in-out; }
        .feasting-mode .fast-ring { animation: pulseFeasting 4s infinite ease-in-out; }

        .fast-hole { width: 100%; height: 100%; border-radius: 50%; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.1; z-index: 2; }
        
        .fast-time { font-family: 'Barlow Condensed', sans-serif; font-size: 4.2rem; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
        .fast-label { font-size: 1rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.1em; transition: color 0.3s; margin-top: 0.5rem;}
        .fasting-mode .fast-label { color: var(--fasting); }
        .feasting-mode .fast-label { color: var(--feasting); }

        .stage-container { max-width: 600px; margin: 0.5rem auto 2.5rem; min-height: 80px; }
        .stage-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; text-transform: uppercase; transition: color 0.3s;}
        .stage-desc { font-size: 0.95rem; color: var(--muted); line-height: 1.5; }
        .fasting-mode .stage-title { color: var(--fasting); }
        .feasting-mode .stage-title { color: var(--feasting); }

        .action-btn { background: var(--input-bg); border: 2px solid var(--border); color: var(--text); padding: 1rem 3rem; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.3rem; text-transform: uppercase; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
        .feasting-mode .action-btn { border-color: var(--fasting); color: var(--fasting); }
        .feasting-mode .action-btn:hover { background: var(--fasting); color: #fff; box-shadow: 0 0 20px var(--fasting-glow);}
        .feasting-mode .action-btn { border-color: var(--feasting); color: var(--feasting); }
        .feasting-mode .action-btn:hover { background: var(--feasting); color: #111; box-shadow: 0 0 20px var(--feasting-glow); }

        .integrated-chart-section { width: 100%; margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;}
        .date-picker { display: flex; align-items: center; gap: 1rem; background: var(--input-bg); padding: 0.3rem 0.8rem; border-radius: 20px; border: 1px solid var(--border);}
        .date-nav-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: color 0.2s; padding: 0.2rem;}
        .date-nav-btn:hover { color: var(--text); }
        .date-range-display { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); min-width: 140px; text-align: center;}
        .view-toggle-group { display: flex; background: var(--toggle-bg); border-radius: 20px; padding: 3px; border: 1px solid var(--border); }
        .view-toggle-btn { background: transparent; border: none; padding: 0.4rem 1.2rem; border-radius: 17px; color: var(--muted); cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.85rem; transition: all 0.2s; }
        .view-toggle-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        .chart-wrapper { width: 100%; height: 260px; position: relative; }

        /* --- SPLIT LAYOUT: Moment States --- */
        .moment-dashboard-layout { display: flex; gap: 3rem; align-items: center; justify-content: space-between; }
        .moment-timers-col { flex: 1; display: flex; flex-direction: column; gap: 0.75rem; }
        .moment-donut-col { width: 240px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;}
        
        @media (max-width: 768px) {
            .moment-dashboard-layout { flex-direction: column; gap: 2rem; }
            .moment-donut-col { width: 100%; max-width: 260px; margin: 0 auto; }
        }

        .moment-btn {
            background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px;
            padding: 1rem 1.5rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s ease; position: relative; outline: none;
            /* THE COLOR RIBBON (Invisible by default) */
            border-left: 4px solid transparent; 
        }
        
        .moment-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.15rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); transition: color 0.3s;}
        .moment-timer-text { font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 1.15rem; tabular-nums; color: var(--text); }
        
        /* Active State Pulses & Ribbons */
        .moment-btn.active-purpose { border-left-color: var(--state-purpose); background: var(--surface); box-shadow: 0 4px 15px var(--glow-purpose); }
        .moment-btn.active-purpose .moment-label { color: var(--state-purpose); }
        
        .moment-btn.active-waste { border-left-color: var(--state-waste); background: var(--surface); box-shadow: 0 4px 15px var(--glow-waste); }
        .moment-btn.active-waste .moment-label { color: var(--state-waste); }

        .moment-btn.active-nourish { border-left-color: var(--state-nourish); background: var(--surface); box-shadow: 0 4px 15px var(--glow-nourish); }
        .moment-btn.active-nourish .moment-label { color: var(--state-nourish); }

        .moment-btn.active-train { border-left-color: var(--state-train); background: var(--surface); box-shadow: 0 4px 15px var(--glow-train); }
        .moment-btn.active-train .moment-label { color: var(--state-train); }

        .moment-btn.active-recover { border-left-color: var(--state-recover); background: var(--surface); box-shadow: 0 4px 15px var(--glow-recover); }
        .moment-btn.active-recover .moment-label { color: var(--state-recover); }

        .moment-donut-wrapper { width: 100%; aspect-ratio: 1; position: relative;}
        
        /* --- Dynamic Tabbed Habits Card --- */
        .tabs-scroll-container { display: flex; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 1rem; margin-bottom: 1rem; gap: 0.2rem;}
        .scroll-arrow { background: transparent; border: none; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0.5rem 0.2rem; transition: color 0.2s; flex-shrink: 0; outline: none; }
        .scroll-arrow:hover { color: var(--text); }

        .tabs-header { display: flex; gap: 0.75rem; overflow-x: auto; scrollbar-width: none; align-items: center; justify-content: center; flex-grow: 1; scroll-behavior: smooth; padding: 0 0.5rem; }
        .tabs-header::-webkit-scrollbar { display: none; }
        
        .tab-btn-group { display: flex; align-items: center; position: relative; }
        
        .tab-btn { 
            background: var(--input-bg); border: 1px solid var(--border); color: var(--muted); 
            padding: 0.6rem 1.2rem; border-radius: 12px; cursor: pointer; transition: all 0.2s; 
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.2rem; outline: none; min-width: max-content;
            /* THE COLOR RIBBON (Invisible by default) */
            border-left: 4px solid transparent;
        }
        
        /* The habit active state keeps the neutral background, but adopts the Color Ribbon */
        .tab-btn.active { background: var(--tab-active-bg); color: var(--tab-active-text); box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top-color: transparent; border-right-color: transparent; border-bottom-color: transparent;}
        .tab-btn.active .cat-name, .tab-btn.active .cat-subtext { color: var(--tab-active-text); }
        
        .cat-pulse-wrapper { display: flex; align-items: center; gap: 0.4rem; justify-content: center;}
        .cat-pulse { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        
        .pulse-g { background: var(--win); box-shadow: 0 0 8px var(--win); animation: pulseG 2s infinite ease-in-out; }
        .pulse-y { background: var(--pulse-y); box-shadow: 0 0 8px var(--pulse-y-glow); animation: pulseY 2s infinite ease-in-out; }
        .pulse-r { background: var(--lose); box-shadow: 0 0 8px var(--lose); animation: pulseR 2s infinite ease-in-out; }
        
        @keyframes pulseG { 0% { box-shadow: 0 0 4px var(--win); } 50% { box-shadow: 0 0 12px var(--win); } 100% { box-shadow: 0 0 4px var(--win); } }
        @keyframes pulseY { 0% { box-shadow: 0 0 4px var(--pulse-y-glow); } 50% { box-shadow: 0 0 12px var(--pulse-y-glow); } 100% { box-shadow: 0 0 4px var(--pulse-y-glow); } }
        @keyframes pulseR { 0% { box-shadow: 0 0 4px var(--lose); } 50% { box-shadow: 0 0 12px var(--lose); } 100% { box-shadow: 0 0 4px var(--lose); } }

        .cat-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 1.05rem; }
        .cat-subtext { font-family: 'Barlow', sans-serif; font-size: 0.75rem; font-weight: 400; opacity: 0.7; letter-spacing: 0; text-transform: none;}
        .tab-btn.active .cat-subtext { opacity: 0.9; }

        .editable-text { cursor: text; border-bottom: 1px dashed transparent; transition: border-color 0.2s; white-space: nowrap;}
        .editable-text:hover, .editable-text:focus { border-bottom-color: var(--muted); outline: none; }
        .tab-btn.active .editable-text:hover, .tab-btn.active .editable-text:focus { border-bottom-color: rgba(255,255,255,0.7); }
        .delete-icon { opacity: 0; background: none; border: none; color: var(--lose); cursor: pointer; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; padding: 0 0.5rem; }
        .habit-row:hover .delete-icon { opacity: 1; }

        .dash-list { display: flex; flex-direction: column; gap: 0.5rem; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .habit-row { display: flex; align-items: center; gap: 1rem; padding: 0.8rem 0; border-bottom: 1px solid var(--border); }
        .habit-row:last-child { border-bottom: none; }
        
        .habit-check { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: var(--input-bg); transition: all 0.2s; flex-shrink: 0;}
        .habit-check.done { background: var(--fasting); border-color: var(--fasting); }
        .habit-check.done::after { content: '✓'; color: #fff; font-size: 0.8rem; font-weight: bold; }
        .habit-label { font-weight: 500; font-size: 1rem; flex-grow: 1; white-space: normal; word-break: break-word;}
        
        .alive-dot { width: 8px; height: 8px; background: var(--fasting); border-radius: 50%; box-shadow: 0 0 8px var(--fasting-glow); animation: pulseFasting 2s infinite ease-in-out; display: inline-block; margin-right: 6px; }
        .habit-streak { font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; color: var(--text); font-weight: 700; display: flex; align-items: center; white-space: nowrap;}
        .habit-streak.zero { color: var(--muted); }
        .habit-streak.zero .alive-dot { display: none; }
        .btn-add-habit { background: transparent; border: 1px dashed var(--border); color: var(--muted); width: 100%; padding: 0.8rem; border-radius: 8px; cursor: pointer; font-family: 'Barlow', sans-serif; font-weight: 500; transition: all 0.2s; margin-top: 0.5rem; text-align: left; }
        .btn-add-habit:hover { border-color: var(--text); color: var(--text); }
        
        /* Auth Card Specific */
        .auth-card, .loading-card { max-width: 450px; margin: 4rem auto; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 4rem 2rem; text-align: center; box-shadow: var(--card-shadow); }
        .auth-card h2 { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 2rem; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--text); }
        .auth-btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; padding: 0.8rem 1rem; margin-top: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
        .auth-btn:hover { border-color: #4285F4; }
    </style>
</head>
<body>

<header>
    <div class="theme-toggle-wrapper">
        <div class="theme-toggle-container" onclick="toggleTheme()" title="Toggle mode">
            <div class="sleek-toggle-track">
                <div class="sleek-toggle-knob">
                    <svg id="icon-sun" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                    </svg>
                    <svg id="icon-moon" style="display: none;" width="14" height="14" fill="currentColor" viewBox="0 0 24 24">

<script>
    // ==========================================
    // 1. SUPABASE CONFIGURATION
    // ==========================================
    const SUPABASE_URL = 'https://ambpjxgidojgmwvvjglg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtYnBqeGdpZG9qZ213dnZqZ2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MzQzNTQsImV4cCI6MjA5MDAxMDM1NH0.8TfCIQhAjPChBZn8op5J9ykyMc3hPDJ_vJuUEm3WcP4';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    const views = { loading: document.getElementById('loadingView'), login: document.getElementById('loginView'), main: document.getElementById('mainContent') };

    function showView(viewName) {
        Object.values(views).forEach(el => el.style.display = 'none');
        if (views[viewName]) views[viewName].style.display = 'block';
    }

    async function checkUser() {
        try {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            if (error) throw error;

            if (session) {
                currentUser = session.user;
                const meta = currentUser.user_metadata;
                if (meta) {
                    if (meta.avatar_url) document.getElementById('userAvatar').src = meta.avatar_url;
                    if (meta.full_name) document.getElementById('userName').innerText = meta.full_name.split(' ')[0];
                    document.getElementById('userProfileCenter').style.display = 'flex';
                } else {
                    document.getElementById('userProfileCenter').style.display = 'flex';
                }
                
                showView('main');
                if(localStorage.getItem('fastingCardCollapsed') === 'true') document.getElementById('fastingHero').classList.add('collapsed');

                await initFastingTracker(); 
                initChart();
                renderHabitsUI(); 
                initMomentStates(); 
            } else {
                document.getElementById('userProfileCenter').style.display = 'none';
                showView('login');
            }
        } catch (err) { showView('login'); }
    }

    async function signInWithGoogle() { await supabaseClient.auth.signInWithOAuth({ provider: 'google' }); }
    async function signOut() { await supabaseClient.auth.signOut(); window.location.reload(); }
    function toggleLogout() { const btn = document.getElementById('logoutBtn'); btn.style.display = (btn.style.display === 'none') ? 'block' : 'none'; }

    // ==========================================
    // 2. MOMENT STATES ENGINE
    // ==========================================
    const momentStatesData = {
        purpose: { timeAccumulatedMs: 0, themeColor: '' },
        waste: { timeAccumulatedMs: 0, themeColor: '' },
        nourish: { timeAccumulatedMs: 0, themeColor: '' },
        train: { timeAccumulatedMs: 0, themeColor: '' },
        recover: { timeAccumulatedMs: 0, themeColor: '' }
    };
    let activeMomentKey = null;
    let momentLastTickMs = null;
    let momentDonutChart = null;

    function initMomentStates() {
        const savedData = localStorage.getItem('momentStatesData');
        if (savedData) {
            const parsed = JSON.parse(savedData);
            for (let key in parsed) if(momentStatesData[key]) momentStatesData[key].timeAccumulatedMs = parsed[key];
        }
        updateMomentChartColors();
        renderMomentChart();
        updateMomentUI();
    }

    function toggleMomentState(stateKey) {
        processMomentTick();
        if (activeMomentKey === stateKey) {
            document.getElementById(`btn-moment-${activeMomentKey}`).classList.remove(`active-${activeMomentKey}`);
            activeMomentKey = null;
            momentLastTickMs = null;
        } else {
            if(activeMomentKey) document.getElementById(`btn-moment-${activeMomentKey}`).classList.remove(`active-${activeMomentKey}`);
            activeMomentKey = stateKey;
            momentLastTickMs = Date.now();
            document.getElementById(`btn-moment-${stateKey}`).classList.add(`active-${stateKey}`);
        }
        updateMomentUI();
    }

    function processMomentTick() {
        if (activeMomentKey && momentLastTickMs) {
            const now = Date.now();
            const deltaMs = now - momentLastTickMs;
            momentStatesData[activeMomentKey].timeAccumulatedMs += deltaMs;
            momentLastTickMs = now;
            
            const saveObj = {};
            for(let key in momentStatesData) saveObj[key] = momentStatesData[key].timeAccumulatedMs;
            localStorage.setItem('momentStatesData', JSON.stringify(saveObj));
        }
    }

    function formatMomentTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function updateMomentUI() {
        for (let key in momentStatesData) {
            document.getElementById(`time-${key}`).innerText = formatMomentTime(momentStatesData[key].timeAccumulatedMs);
        }
        if(momentDonutChart) {
            momentDonutChart.data.datasets[0].data = [
                Math.floor(momentStatesData.purpose.timeAccumulatedMs / 1000),
                Math.floor(momentStatesData.waste.timeAccumulatedMs / 1000),
                Math.floor(momentStatesData.nourish.timeAccumulatedMs / 1000),
                Math.floor(momentStatesData.train.timeAccumulatedMs / 1000),
                Math.floor(momentStatesData.recover.timeAccumulatedMs / 1000)
            ];
            momentDonutChart.update();
        }
    }

    function updateMomentChartColors() {
        const html = document.documentElement;
        momentStatesData.purpose.themeColor = getComputedStyle(html).getPropertyValue('--state-purpose').trim();
        momentStatesData.waste.themeColor = getComputedStyle(html).getPropertyValue('--state-waste').trim();
        momentStatesData.nourish.themeColor = getComputedStyle(html).getPropertyValue('--state-nourish').trim();
        momentStatesData.train.themeColor = getComputedStyle(html).getPropertyValue('--state-train').trim();
        momentStatesData.recover.themeColor = getComputedStyle(html).getPropertyValue('--state-recover').trim();
    }

    function renderMomentChart() {
        const ctx = document.getElementById('momentDonutChart').getContext('2d');
        if(momentDonutChart) momentDonutChart.destroy();
        
        momentDonutChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Purposeful', 'Wasteful', 'Nourishing', 'Training', 'Recovering'],
                datasets: [{
                    data: [0, 0, 0, 0, 0],
                    backgroundColor: [
                        momentStatesData.purpose.themeColor,
                        momentStatesData.waste.themeColor,
                        momentStatesData.nourish.themeColor,
                        momentStatesData.train.themeColor,
                        momentStatesData.recover.themeColor
                    ],
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                cutout: '75%',
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                const totalSec = context.raw;
                                const h = Math.floor(totalSec / 3600);
                                const m = Math.floor((totalSec % 3600) / 60);
                                return ` ${h}h ${m}m`;
                            }
                        }
                    }
                }
            }
        });
    }

    // ==========================================
    // 3. HABITS ENGINE (Unified Naming)
    // ==========================================
    let categories = [
        { id: 'cat_1', name: 'Purposeful', subtext: 'What you build', habits: [{ id: 'hab_1', name: 'PADI Theory / Instructor Study', streak: 4, done: true }, { id: 'hab_2', name: 'Camp & Dive Web App Dev', streak: 0, done: false }] },
        { id: 'cat_2', name: 'Wasteful', subtext: 'What drains you', habits: [{ id: 'hab_3', name: 'No PlayStation Binge Gaming', streak: 8, done: true }, { id: 'hab_4', name: 'No Mindless Doom Scrolling', streak: 3, done: true }] },
        { id: 'cat_3', name: 'Nourishing', subtext: 'What fuels you', habits: [{ id: 'hab_5', name: 'Strict Keto / Sugar-Free Compliant', streak: 14, done: true }, { id: 'hab_6', name: 'Black Coffee / Tea Only (Fasting)', streak: 21, done: true }] },
        { id: 'cat_4', name: 'Training', subtext: 'What strengthens you', habits: [{ id: 'hab_7', name: 'Evening Mobility / Stretch', streak: 2, done: true }] },
        { id: 'cat_5', name: 'Recovering', subtext: 'What restores you', habits: [{ id: 'hab_8', name: '7+ Hours Restful Sleep', streak: 2, done: true }, { id: 'hab_9', name: 'Screens off 1hr Before Bed', streak: 0, done: false }] }
    ];
    let activeCatId = 'cat_1';

    // The mapped connection between Habits and Moment States for the Color Ribbon
    const catKeyMap = { cat_1: 'purpose', cat_2: 'waste', cat_3: 'nourish', cat_4: 'train', cat_5: 'recover' };

    function scrollTabs(direction) { document.getElementById('dynamicTabsHeader').scrollBy({ left: direction * 200, behavior: 'smooth' }); }

    function renderHabitsUI() {
        const tabsContainer = document.getElementById('dynamicTabsHeader');
        const listContainer = document.getElementById('dynamicHabitsContainer');
        tabsContainer.innerHTML = '';
        categories.forEach(cat => {
            const isActive = cat.id === activeCatId ? 'active' : '';
            const total = cat.habits.length, done = cat.habits.filter(h => h.done).length;
            let pulseClass = 'pulse-r'; 
            if (total > 0) { if (done === total) pulseClass = 'pulse-g'; else if (done > 0) pulseClass = 'pulse-y'; }

            // The Color Ribbon logic connects the Tab to the Moment State
            const ribbonStyle = isActive ? `border-left-color: var(--state-${catKeyMap[cat.id]});` : '';

            tabsContainer.innerHTML += `
                <div class="tab-btn-group">
                    <button class="tab-btn ${isActive}" onclick="setActiveCategory('${cat.id}')" style="${ribbonStyle}">
                        <div class="cat-pulse-wrapper"><div class="cat-pulse ${pulseClass}"></div><span class="cat-name">${cat.name}</span></div>
                        <span class="cat-subtext">${cat.subtext}</span>
                    </button>
                </div>
            `;
        });
        const activeCat = categories.find(c => c.id === activeCatId);
        if (!activeCat) { listContainer.innerHTML = '<p style="color:var(--muted); padding: 1rem;">No category selected.</p>'; return; }
        let habitsHTML = `<div class="dash-list">`;
        activeCat.habits.forEach(hab => {
            const isDone = hab.done ? 'done' : '', streakZeroClass = hab.streak === 0 ? 'zero' : '';
            habitsHTML += `
                <div class="habit-row">
                    <div class="habit-check ${isDone}" onclick="toggleHabit('${hab.id}')"></div>
                    <span class="habit-label editable-text" contenteditable="true" onblur="saveEdit(event, 'habit', '${hab.id}')" onkeydown="handleEnterKey(event)">${hab.name}</span>
                    <span class="habit-streak ${streakZeroClass}"><span class="alive-dot"></span> ${hab.streak} Day${hab.streak !== 1 ? 's' : ''}</span>
                    <button class="delete-icon" onclick="deleteHabit('${hab.id}')" title="Delete Habit"><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
            `;
        });
        habitsHTML += `<button class="btn-add-habit" onclick="addHabit()">+ Add Habit</button></div>`;
        listContainer.innerHTML = habitsHTML;
    }

    function setActiveCategory(id) { if (activeCatId === id) return; activeCatId = id; renderHabitsUI(); }
    function toggleHabit(id) { const hab = categories.find(c => c.id === activeCatId).habits.find(h => h.id === id); hab.done = !hab.done; if(hab.done && hab.streak === 0) hab.streak = 1; else if(!hab.done && hab.streak === 1) hab.streak = 0; renderHabitsUI(); }
    function addHabit() { categories.find(c => c.id === activeCatId).habits.push({ id: 'hab_' + Date.now(), name: 'New Habit', streak: 0, done: false }); renderHabitsUI(); }
    function deleteHabit(id) { const cat = categories.find(c => c.id === activeCatId); cat.habits = cat.habits.filter(h => h.id !== id); renderHabitsUI(); }
    function handleEnterKey(e) { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } }
    function saveEdit(e, type, id) { const newText = e.target.innerText.trim() || 'Unnamed'; if (type === 'habit') { const hab = categories.find(c => c.id === activeCatId).habits.find(h => h.id === id); if(hab) hab.name = newText; } }

    // ==========================================
    // 4. FASTING ENGINE
    // ==========================================
    let isFasting = false, startTime = null, currentFastId = null, mainTimerInterval = null;
    const fastingStages = [
        { maxHour: 4, title: "Stage 1: Fed/Digestive State (0–4 Hours)", desc: "Process: Digestion and nutrient absorption.<br>Action: Glucose is used for energy, excess stored as glycogen." },
        { maxHour: 12, title: "Stage 2: Early Fasting/Postabsorptive Phase (4–12 Hours)", desc: "Process: Blood sugar and insulin levels decline.<br>Action: The body breaks down glycogen to release glucose for energy." },
        { maxHour: 16, title: "Stage 3: Ketosis and Fat Burning (12–16 Hours)", desc: "Process: Glycogen stores depleted, switching to burning fat.<br>Action: Production of ketones begins for brain fuel, increasing mental clarity." },
        { maxHour: 24, title: "Stage 4: Autophagy (16–24 Hours)", desc: "Process: The body begins 'cellular cleanup'.<br>Action: Repairs and recycles damaged components. Hunger heavily subsides." },
        { maxHour: 72, title: "Stage 5: Deep Fasting/Growth Hormone Phase (24–72 Hours)", desc: "Process: Peak autophagy and rise in Human Growth Hormone (HGH).<br>Action: Accelerated fat loss and significantly improved cognitive function." },
        { maxHour: 999, title: "Stage 6: Immune Regeneration (72+ Hours)", desc: "Process: Immune system stem cells are activated.<br>Action: Deep, long-term fat burning and cellular repair." }
    ];

    function toggleFastingCollapse() { const hero = document.getElementById('fastingHero'); hero.classList.toggle('collapsed'); localStorage.setItem('fastingCardCollapsed', hero.classList.contains('collapsed')); }

    async function initFastingTracker() {
        const { data, error } = await supabaseClient.from('fasting_sessions').select('*').eq('user_id', currentUser.id).order('start_time', { ascending: false }).limit(1);
        if (!error && data && data.length > 0) {
            if (!data[0].end_time) { isFasting = true; startTime = new Date(data[0].start_time).getTime(); currentFastId = data[0].id; } 
            else { isFasting = false; startTime = new Date(data[0].end_time).getTime(); currentFastId = null; }
        } else { isFasting = false; startTime = Date.now(); }
        updateUITheme(); 
        
        if(mainTimerInterval) clearInterval(mainTimerInterval);
        mainTimerInterval = setInterval(() => {
            updateFastingTimer();
            processMomentTick(); 
            updateMomentUI();    
        }, 1000); 
    }

    async function toggleFasting(event) {
        event.stopPropagation(); const now = new Date(); document.getElementById('toggleFastBtn').disabled = true; 
        if (!isFasting) {
            isFasting = true; startTime = now.getTime(); updateUITheme(); 
            const { data } = await supabaseClient.from('fasting_sessions').insert([{ user_id: currentUser.id, start_time: now.toISOString() }]).select();
            if (data) currentFastId = data[0].id;
        } else {
            isFasting = false; const endTimeMs = now.getTime(); startTime = endTimeMs; updateUITheme();
            if (currentFastId) {
                await supabaseClient.from('fasting_sessions').update({ end_time: now.toISOString(), duration_hours: ((endTimeMs - startTime) / 3600000).toFixed(2) }).eq('id', currentFastId);
                currentFastId = null;
            }
        }
        document.getElementById('toggleFastBtn').disabled = false; updateFastingTimer();
    }

    function updateUITheme() {
        const hero = document.getElementById('fastingHero'), btn = document.getElementById('toggleFastBtn');
        if (isFasting) {
            hero.classList.replace('feasting-mode', 'fasting-mode');
            document.getElementById('fastStatusLabel').innerText = "Fasting (Fat Burning)";
            document.getElementById('miniHeroTitle').innerText = "Fasting Active";
            btn.innerText = "Break Fast";
        } else {
            hero.classList.replace('fasting-mode', 'feasting-mode');
            document.getElementById('fastStatusLabel').innerText = "Feasting (Accumulation)";
            document.getElementById('miniHeroTitle').innerText = "Feasting Window";
            btn.innerText = "Done Eating";
        }
    }

    function updateFastingTimer() {
        if (!startTime) return;
        const totalSeconds = Math.floor(Math.max(0, Date.now() - startTime) / 1000);
        const displayTime = `${String(Math.floor(totalSeconds / 3600)).padStart(2, '0')}:${String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0')}:${String(totalSeconds % 60).padStart(2, '0')}`;
        document.getElementById('fastTimeDisplay').innerText = displayTime; document.getElementById('miniFastTimeDisplay').innerText = displayTime;

        if (isFasting) {
            let currentStage = fastingStages[0];
            for (let stage of fastingStages) if ((totalSeconds / 3600) < stage.maxHour) { currentStage = stage; break; }
            document.getElementById('stageTitle').innerText = currentStage.title; document.getElementById('stageDesc').innerHTML = currentStage.desc;
        } else {
            document.getElementById('stageTitle').innerText = "Feasting Window (Nutrient Partitioning)";
            document.getElementById('stageDesc').innerHTML = "Process: Insulin rises to shuttle nutrients into cells.<br>Action: Replenishing glycogen, repairing muscle tissue, and preparing the body for the next fast.";
        }
    }

    // ==========================================
    // 5. CHART ENGINE & THEME BOOT
    // ==========================================
    let fastingChart = null; 
    function setChartView(view) {
        document.getElementById('btnWeekly').classList.toggle('active', view === 'weekly');
        document.getElementById('btnMonthly').classList.toggle('active', view === 'monthly');
        renderChart();
    }
    function shiftChartData(direction) { alert(`Will fetch data from database!`); }

    function renderChart() {
        const ctx = document.getElementById('fastingChart').getContext('2d'), html = document.documentElement;
        const textColor = getComputedStyle(html).getPropertyValue('--muted').trim(), gridColor = getComputedStyle(html).getPropertyValue('--chart-grid').trim();
        const lineColor = getComputedStyle(html).getPropertyValue('--fasting').trim(), fillColor = getComputedStyle(html).getPropertyValue('--fasting-glow').trim();
        document.getElementById('chartDateRange').innerText = "Mar 19 - Mar 25";

        const config = { type: 'line', data: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], datasets: [{ data: [14.5, 15.2, 16.0, 18.5, 16.2, 15.5, 12.0], borderColor: lineColor, backgroundColor: fillColor, borderWidth: 3, pointBackgroundColor: lineColor, pointBorderColor: '#fff', fill: true, tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 10, max: 24, grid: { color: gridColor, drawBorder: false }, ticks: { color: textColor } }, x: { grid: { display: false, drawBorder: false }, ticks: { color: textColor } } } } };
        if(fastingChart) fastingChart.destroy(); fastingChart = new Chart(ctx, config);
    }
    function initChart() { renderChart(); }
    
    function toggleTheme() {
        const html = document.documentElement; const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        document.getElementById('icon-sun').style.display = next === 'light' ? 'block' : 'none';
        document.getElementById('icon-moon').style.display = next === 'dark' ? 'block' : 'none';
        document.getElementById('theme-label').textContent = next === 'light' ? 'Light Mode' : 'Dark Mode';
        
        if (currentUser) { 
            updateFastingTimer(); 
            if(fastingChart) renderChart(); 
            updateMomentChartColors();
            if(momentDonutChart) renderMomentChart(); 
        }
    }

    checkUser();
</script>
</body>
</html>
